<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRA — Hafta batafsil</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .week-header { background: linear-gradient(135deg, var(--navy), var(--blue));
                  color: white; padding: 20px 24px; border-radius: 12px; margin-bottom: 20px; }
  .week-header h1 { font-size: 24px; font-weight: 700; margin: 0 0 6px 0; }
  .week-header .subtitle { font-size: 13px; opacity: 0.9; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.85);
                text-decoration: none; font-size: 12px; padding: 4px 10px;
                background: rgba(255,255,255,0.1); border-radius: 6px; }
  .back-link:hover { background: rgba(255,255,255,0.2); color: white; }

  .breakdown-row { display: flex; align-items: center; gap: 10px; padding: 8px 0;
                    border-bottom: 1px dashed var(--border-light); font-size: 12.5px; }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-label { flex: 1; color: var(--text-secondary); }
  .breakdown-value { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
  .breakdown-pct { color: var(--text-tertiary); font-size: 11px; min-width: 56px; text-align: right; }

  .metric-mini { padding: 12px; background: var(--gray-50); border-radius: 8px; }
  .metric-mini-label { font-size: 10px; color: var(--text-tertiary); margin-bottom: 4px;
                        text-transform: uppercase; letter-spacing: 0.3px; }
  .metric-mini-value { font-size: 18px; font-weight: 700; color: var(--text); }
  .metric-mini-extra { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="page">
      <div id="content"></div>
    </main>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/app-init.js"></script>
<script src="js/main.js"></script>
<script src="js/baza-formulas.js"></script>
<script src="js/calculator.js"></script>

<script>
  window.initPage = function() {
    setupLayout('pnl');

    const params = new URLSearchParams(window.location.search);
    const weekStart = params.get('week');
    const content = document.getElementById('content');

    if (!weekStart) {
      content.innerHTML = '<a href="pnl.html" class="btn btn-primary">← P&L sahifasiga qaytish</a><br><br>Hafta tanlanmagan.';
      return;
    }

    const base = Storage.getBase();
    if (base.length === 0) {
      renderEmpty(content, {
        icon: '📅',
        title: 'Ma\'lumot yo\'q',
        message: 'Avval Подробный отчёt yuklang',
        link: 'upload.html',
        linkText: '📤 Yuklash'
      });
      return;
    }

    const settings = Storage.getSettings();
    const cur = settings.currency;

    (async function() {
      const baseLen = base.length;
      const showProgress = baseLen > 10000;

      let calculated;
      if (showProgress) {
        Calculator.showProgress();
        try {
          calculated = await Calculator.getCalculated((current, total, pct) => {
            Calculator.updateProgress(current, total, pct);
          });
        } finally {
          Calculator.hideProgress();
        }
      } else {
        calculated = await Calculator.getCalculated();
      }

      // Faqat shu haftaga tegishli qatorlar
      const weekRows = calculated.filter(r => r.AP === weekStart || r.sale_date === weekStart);

      if (weekRows.length === 0) {
        content.innerHTML = `
          <div class="week-header">
            <a href="pnl.html" class="back-link">← P&L sahifasiga qaytish</a>
            <h1 style="margin-top: 10px;">${fmtDate(weekStart)}</h1>
            <div class="subtitle">Bu haftada ma'lumot topilmadi</div>
          </div>
        `;
        return;
      }

      const ctx = {
        costs: Storage.getCosts(),
        settings,
        samovikupy: Storage.getSelfPurchases(),
        extExpenses: Storage.getExtExpenses(),
        listReports: Storage.getListReports()
      };

      const kpi = BazaFormulas.calculateKPI(weekRows, ctx);
      const products = BazaFormulas.byProduct(weekRows);

      // Achotlar shu haftada
      const uniqueReports = [...new Set(weekRows.map(r => r.report_num))].filter(Boolean);
      const reportInfo = uniqueReports.map(rn => {
        const lr = Storage.getReport(rn);
        return { num: rn, info: lr };
      });

      const weekEnd = weekRows.map(r => r.sale_date).filter(d => d).sort().pop();

      content.innerHTML = `
        <div class="week-header">
          <a href="pnl.html" class="back-link">← P&L sahifasiga qaytish</a>
          <h1 style="margin-top: 10px;">📅 ${fmtDate(weekStart)}${weekEnd && weekEnd !== weekStart ? ' – ' + fmtDate(weekEnd) : ''}</h1>
          <div class="subtitle">
            ${fmt(weekRows.length)} qator ·
            ${uniqueReports.length} ta achot ·
            ${fmt(kpi.sales_qty)} dona sotilgan
          </div>
        </div>

        <!-- ASOSIY KPI -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 16px;">
          <div class="kpi-card">
            <div class="kpi-label">💰 Daromad (Выручка)</div>
            <div class="kpi-value">${fmtMoneyShort(kpi.revenue, cur)}</div>
            <div class="kpi-change">${fmt(kpi.sales_qty)} dona × ${fmtMoney(kpi.avg_price, cur)}</div>
          </div>
          <div class="kpi-card ${kpi.net_profit >= 0 ? 'success' : 'danger'}">
            <div class="kpi-label">${kpi.net_profit >= 0 ? '✅' : '⚠️'} Toza foyda</div>
            <div class="kpi-value">${fmtMoneyShort(kpi.net_profit, cur)}</div>
            <div class="kpi-change">Marja ${fmtPercent(kpi.margin_pct)} · ROI ${fmtPercent(kpi.roi_pct)}</div>
          </div>
          <div class="kpi-card warning">
            <div class="kpi-label">💸 WB ushlanmalari</div>
            <div class="kpi-value">${fmtMoneyShort(kpi.all_wb_deductions, cur)}</div>
            <div class="kpi-change">${fmtPercent(kpi.all_ded_pct)} daromaddan</div>
          </div>
          <div class="kpi-card success">
            <div class="kpi-label">🏦 Опл. РС</div>
            <div class="kpi-value">${fmtMoneyShort(kpi.to_pay_rs, cur)}</div>
          </div>
        </div>

        <!-- 2-qator: detail metrics -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">📊 Sotuvlar va moliya tafsilotlari</div>
            <div class="card-subtitle">Bu haftaga tegishli</div>
          </div>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px;">
            <div class="metric-mini">
              <div class="metric-mini-label">Sotilgan</div>
              <div class="metric-mini-value">${fmt(kpi.sales_qty)}</div>
              <div class="metric-mini-extra">dona</div>
            </div>
            <div class="metric-mini">
              <div class="metric-mini-label">Sotuv summasi</div>
              <div class="metric-mini-value">${fmtMoneyShort(kpi.sales_rub, cur)}</div>
            </div>
            <div class="metric-mini">
              <div class="metric-mini-label">Qaytarishlar</div>
              <div class="metric-mini-value">${fmt(kpi.returns_qty)}</div>
              <div class="metric-mini-extra">${fmtMoneyShort(kpi.returns_rub, cur)}</div>
            </div>
            <div class="metric-mini">
              <div class="metric-mini-label">O'rtacha chek</div>
              <div class="metric-mini-value">${fmtMoney(kpi.avg_price, cur)}</div>
            </div>
            <div class="metric-mini">
              <div class="metric-mini-label">СПП</div>
              <div class="metric-mini-value">${fmtPercent(kpi.spp_pct)}</div>
            </div>
            <div class="metric-mini">
              <div class="metric-mini-label">WB реализовал</div>
              <div class="metric-mini-value">${fmtMoneyShort(kpi.wb_realized, cur)}</div>
            </div>
            <div class="metric-mini">
              <div class="metric-mini-label">Soliq (${settings.tax_rate}%)</div>
              <div class="metric-mini-value">${fmtMoneyShort(kpi.tax, cur)}</div>
            </div>
            <div class="metric-mini">
              <div class="metric-mini-label">Tannarx</div>
              <div class="metric-mini-value">${fmtMoneyShort(kpi.cost, cur)}</div>
            </div>
          </div>
        </div>

        <!-- WB ushlanmalar batafsil -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 12px;">
          <div class="card">
            <div class="card-header">
              <div class="card-title">🏛 WB ushlanmalari</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Komissiya</div>
              <div class="breakdown-value">${fmtMoney(kpi.commission, cur)}</div>
              <div class="breakdown-pct">${fmtPercent(kpi.commission_pct)}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Ekvayring</div>
              <div class="breakdown-value">${fmtMoney(kpi.acquiring, cur)}</div>
              <div class="breakdown-pct">${kpi.revenue > 0 ? fmtPercent(kpi.acquiring / kpi.revenue * 100) : '—'}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Logistika (jami)</div>
              <div class="breakdown-value">${fmtMoney(kpi.logistics_total, cur)}</div>
              <div class="breakdown-pct">${fmtPercent(kpi.logistics_pct)}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Saqlash</div>
              <div class="breakdown-value">${fmtMoney(kpi.storage, cur)}</div>
              <div class="breakdown-pct">${fmtPercent(kpi.storage_pct)}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Shtraflar</div>
              <div class="breakdown-value">${fmtMoney(kpi.fines, cur)}</div>
              <div class="breakdown-pct">${kpi.revenue > 0 ? fmtPercent(kpi.fines / kpi.revenue * 100) : '—'}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">ВБ.Продвижение</div>
              <div class="breakdown-value">${fmtMoney(kpi.promotion, cur)}</div>
              <div class="breakdown-pct">${kpi.revenue > 0 ? fmtPercent(kpi.promotion / kpi.revenue * 100) : '—'}</div>
            </div>
            <div class="breakdown-row" style="border-top: 2px solid var(--border); margin-top: 6px; padding-top: 8px;">
              <div class="breakdown-label" style="font-weight: 700;">JAMI</div>
              <div class="breakdown-value" style="font-weight: 700; color: var(--red-dark);">${fmtMoney(kpi.all_wb_deductions, cur)}</div>
              <div class="breakdown-pct" style="font-weight: 700;">${fmtPercent(kpi.all_ded_pct)}</div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <div class="card-title">📑 Yakuniy hisob</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Daromad</div>
              <div class="breakdown-value text-blue">+${fmtMoney(kpi.revenue, cur)}</div>
              <div class="breakdown-pct">100%</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">WB ushlanmalari</div>
              <div class="breakdown-value num-negative">-${fmtMoney(kpi.all_wb_deductions, cur)}</div>
              <div class="breakdown-pct">${fmtPercent(kpi.all_ded_pct)}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Опл. РС</div>
              <div class="breakdown-value">${fmtMoney(kpi.to_pay_rs, cur)}</div>
              <div class="breakdown-pct">${kpi.revenue > 0 ? fmtPercent(kpi.to_pay_rs / kpi.revenue * 100) : '—'}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Tannarx</div>
              <div class="breakdown-value num-negative">-${fmtMoney(kpi.cost, cur)}</div>
              <div class="breakdown-pct">${fmtPercent(kpi.cost_pct)}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Soliq (${settings.tax_rate}%)</div>
              <div class="breakdown-value num-negative">-${fmtMoney(kpi.tax, cur)}</div>
              <div class="breakdown-pct">${kpi.revenue > 0 ? fmtPercent(kpi.tax / kpi.revenue * 100) : '—'}</div>
            </div>
            <div class="breakdown-row" style="border-top: 2px solid var(--border); margin-top: 6px; padding-top: 8px;">
              <div class="breakdown-label" style="font-weight: 700;">Toza foyda</div>
              <div class="breakdown-value" style="font-weight: 700; color: ${kpi.net_profit >= 0 ? 'var(--green-dark)' : 'var(--red-dark)'};">${fmtMoney(kpi.net_profit, cur)}</div>
              <div class="breakdown-pct" style="font-weight: 700;">${fmtPercent(kpi.margin_pct)}</div>
            </div>
          </div>
        </div>

        <!-- Tovarlar -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">📦 Bu haftada sotilgan tovarlar (${products.length} ta)</div>
            <div class="card-subtitle">Daromad bo'yicha saralangan</div>
          </div>
          <div class="table-wrapper" style="border: none;">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Artikul</th>
                  <th>Tovar</th>
                  <th class="num">Sotilgan</th>
                  <th class="num">Daromad</th>
                  <th class="num">Tannarx</th>
                  <th class="num">Foyda</th>
                  <th class="num">Marja</th>
                </tr>
              </thead>
              <tbody>
                ${products.map((p, i) => `
                  <tr>
                    <td>${i + 1}</td>
                    <td><strong>${p.article}</strong></td>
                    <td style="max-width: 250px; overflow: hidden; text-overflow: ellipsis;" title="${p.product}">${(p.product || '').substring(0, 40)}</td>
                    <td class="num">${fmt(p.qty)}</td>
                    <td class="num num-positive">${fmtMoney(p.revenue, cur)}</td>
                    <td class="num num-negative">${fmtMoney(p.cost, cur)}</td>
                    <td class="num ${p.profit >= 0 ? 'num-positive' : 'num-negative'}">${fmtMoney(p.profit, cur)}</td>
                    <td class="num">${fmtPercent(p.margin_pct)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- Achotlar -->
        ${reportInfo.length > 0 ? `
          <div class="card">
            <div class="card-header">
              <div class="card-title">📋 Bu haftada hisoblangan achotlar</div>
            </div>
            ${reportInfo.map(r => `
              <div style="padding: 10px 12px; background: var(--blue-bg); border-radius: 6px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px;">
                <strong style="color: var(--navy);">№ ${r.num}</strong>
                ${r.info ? `<span style="font-size: 12px; color: var(--text-secondary);">${fmtDate(r.info.date_from)} – ${fmtDate(r.info.date_to)}</span>` : ''}
                ${r.info ? `<span style="font-size: 12px; color: var(--green-dark); margin-left: auto;">${fmtMoney(r.info.total_to_pay || 0, cur)}</span>` : ''}
              </div>
            `).join('')}
          </div>
        ` : ''}
      `;
    })();
  };
</script>

</body>
</html>
