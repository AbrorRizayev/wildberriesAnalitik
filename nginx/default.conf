upstream aira_app {
    server web:8000;
}

# ── HTTP :80 ── serves the Let's Encrypt challenge and redirects all other
# traffic to HTTPS. Nothing real is served over plain HTTP, so the Secure
# session/CSRF cookies always travel over TLS.
server {
    listen 80;
    server_name airastats.uz www.airastats.uz;

    # ACME HTTP-01 challenge files, written by certbot into the shared webroot.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 ── the real site. TLS terminates here.
server {
    listen 443 ssl;
    http2 on;
    server_name airastats.uz www.airastats.uz;

    ssl_certificate     /etc/letsencrypt/live/airastats.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/airastats.uz/privkey.pem;

    # Modern, widely-compatible TLS (Mozilla "intermediate").
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_prefer_server_ciphers off;

    # WB Excel uploads are capped at 30 MB in Django; allow a little headroom.
    client_max_body_size 35m;

    # Don't log noise for favicon.
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # Serve collected static files straight from disk (fast path, no Python).
    # WhiteNoise also serves these, so the app still works without nginx.
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://aira_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # TLS terminates here, so the original request WAS https. Django trusts
        # this via SECURE_PROXY_SSL_HEADER and marks the request secure, which
        # is what makes the Secure CSRF/session cookies work correctly.
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}