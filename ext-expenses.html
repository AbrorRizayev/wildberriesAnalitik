<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRA — Внешние расходы</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(4, 44, 83, 0.5); display: none; align-items: center; justify-content: center; z-index: 999; }
  .modal-overlay.show { display: flex; }
  .modal-content { background: white; padding: 24px; border-radius: 12px; max-width: 480px; width: 90%; max-height: 90vh; overflow-y: auto; }
  .cat-badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .cat-reklama { background: #FEE2E2; color: #B7332E; }
  .cat-marketing { background: #DBEAFE; color: #185FA5; }
  .cat-tovarlar { background: #DCFCE7; color: #095440; }
  .cat-logistika { background: #FEF3C7; color: #92400E; }
  .cat-soliq { background: #E0E7FF; color: #4338CA; }
  .cat-boshqa { background: #F3F4F6; color: #6B7280; }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="page">
      <div id="content"></div>
    </main>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal-content">
    <h3 style="margin: 0 0 6px 0; color: var(--navy); font-size: 16px;">Xarajat qo'shish</h3>
    <p style="margin: 0 0 16px 0; color: var(--text-tertiary); font-size: 12px;">WB'dan tashqarida bo'lgan xarajatlar (Reklama, IP, marketing va h.k.)</p>

    <div style="margin-bottom: 10px;">
      <label class="form-label">Sana *</label>
      <input type="date" id="newDate" class="form-input" style="width: 100%;">
    </div>
    <div style="margin-bottom: 10px;">
      <label class="form-label">Kategoriya *</label>
      <select id="newCategory" class="form-input" style="width: 100%;">
        <option value="Реклама">📢 Реклама (WB tashqarida)</option>
        <option value="Маркетинг">📊 Маркетинг (SMM, blogerlar)</option>
        <option value="Закупка товара">📦 Закупка товара</option>
        <option value="Логистика">🚚 Логистика (omborgacha)</option>
        <option value="Налоги">📋 Налоги</option>
        <option value="Зарплата">💼 Зарплата</option>
        <option value="Аренда">🏢 Аренда</option>
        <option value="Услуги">🔧 Услуги</option>
        <option value="Другое">📝 Другое</option>
      </select>
    </div>
    <div style="margin-bottom: 10px;">
      <label class="form-label">Tavsif *</label>
      <input type="text" id="newDescription" class="form-input" placeholder="Misol: Instagram reklama, Iyul 2026" style="width: 100%;">
    </div>
    <div style="margin-bottom: 10px;">
      <label class="form-label">Summa (₽) *</label>
      <input type="number" id="newAmount" class="form-input" placeholder="50000" step="0.01" style="width: 100%;">
    </div>
    <div style="margin-bottom: 16px;">
      <label class="form-label">Eslatma</label>
      <textarea id="newNote" class="form-input" placeholder="(ixtiyoriy)" rows="2" style="width: 100%; resize: vertical;"></textarea>
    </div>

    <div style="display: flex; gap: 8px;">
      <button class="btn btn-primary" onclick="saveExpense()" style="flex: 1; padding: 10px;">💾 Saqlash</button>
      <button class="btn btn-outline" onclick="closeModal()" style="flex: 1; padding: 10px;">Bekor</button>
    </div>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/app-init.js"></script>
<script src="js/main.js"></script>

<script>
  let editingId = null;
  let filterCategory = '';
  let filterMonth = '';

  window.initPage = function() {
    setupLayout('ext_expenses');
    render();
  };

  function categoryClass(cat) {
    const map = {
      'Реклама': 'cat-reklama',
      'Маркетинг': 'cat-marketing',
      'Закупка товара': 'cat-tovarlar',
      'Логистика': 'cat-logistika',
      'Налоги': 'cat-soliq',
      'Зарплата': 'cat-boshqa',
      'Аренда': 'cat-boshqa',
      'Услуги': 'cat-boshqa',
      'Другое': 'cat-boshqa'
    };
    return map[cat] || 'cat-boshqa';
  }

  function render() {
    const content = document.getElementById('content');
    const all = Storage.getExtExpenses();
    const settings = Storage.getSettings();
    const cur = settings.currency;

    // Filtrlash
    let expenses = all;
    if (filterCategory) expenses = expenses.filter(e => e.category === filterCategory);
    if (filterMonth) expenses = expenses.filter(e => (e.date || '').startsWith(filterMonth));

    // Sort by date desc
    expenses = expenses.slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    // Categoriyalar bo'yicha
    const byCategory = {};
    for (const e of all) {
      const cat = e.category || 'Другое';
      if (!byCategory[cat]) byCategory[cat] = { count: 0, total: 0 };
      byCategory[cat].count++;
      byCategory[cat].total += e.amount || 0;
    }
    const categories = Object.entries(byCategory).sort((a, b) => b[1].total - a[1].total);

    const totalAmount = all.reduce((s, e) => s + (e.amount || 0), 0);
    const filteredTotal = expenses.reduce((s, e) => s + (e.amount || 0), 0);

    // Oylar
    const months = [...new Set(all.map(e => (e.date || '').substring(0, 7)).filter(m => m))].sort().reverse();

    content.innerHTML = `
      <div class="page-header">
        <h1 class="page-title">💸 Внешние расходы</h1>
        <p class="page-subtitle">WB'dan tashqaridagi xarajatlar — Toza foyda hisobidan ayriladi</p>
      </div>

      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 16px;">
        <div class="kpi-card danger">
          <div class="kpi-label">💸 Jami xarajat</div>
          <div class="kpi-value">${fmtMoneyShort(totalAmount, cur)}</div>
          <div class="kpi-change">${all.length} ta yozuv</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">📊 Kategoriyalar</div>
          <div class="kpi-value">${categories.length}</div>
          <div class="kpi-change">turli xil</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">📅 Oylar</div>
          <div class="kpi-value">${months.length}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">📈 O'rtacha</div>
          <div class="kpi-value">${all.length > 0 ? fmtMoneyShort(totalAmount / all.length, cur) : '—'}</div>
          <div class="kpi-change">har xarajatda</div>
        </div>
      </div>

      ${categories.length > 0 ? `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">📊 Kategoriyalar bo'yicha</div>
              <div class="card-subtitle">Qaysi kategoriyaga ko'p sarflagansiz</div>
            </div>
          </div>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px;">
            ${categories.map(([cat, d]) => `
              <div style="padding: 12px; background: var(--gray-50); border-radius: 8px; border-left: 3px solid var(--purple);">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;">
                  <span class="cat-badge ${categoryClass(cat)}">${cat}</span>
                  <span style="font-size: 11px; color: var(--text-tertiary);">${d.count} ta</span>
                </div>
                <div style="font-size: 18px; font-weight: 700; color: var(--navy);">${fmtMoney(d.total, cur)}</div>
                <div style="height: 5px; background: var(--gray-100); border-radius: 3px; overflow: hidden; margin-top: 8px;">
                  <div style="height: 100%; background: var(--purple); width: ${(d.total / totalAmount * 100).toFixed(1)}%;"></div>
                </div>
                <div style="font-size: 10px; color: var(--text-tertiary); margin-top: 3px; text-align: right;">${(d.total / totalAmount * 100).toFixed(1)}%</div>
              </div>
            `).join('')}
          </div>
        </div>
      ` : ''}

      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">📋 Hamma xarajatlar</div>
            <div class="card-subtitle">${expenses.length} ta yozuv · ${fmtMoney(filteredTotal, cur)}</div>
          </div>
          <div style="display: flex; gap: 8px;">
            <select onchange="filterCategory=this.value; render();" class="form-input" style="font-size: 11px; padding: 6px 10px; max-width: 140px;">
              <option value="">Hamma kategoriya</option>
              ${categories.map(([cat]) => `<option value="${cat}" ${filterCategory === cat ? 'selected' : ''}>${cat}</option>`).join('')}
            </select>
            <select onchange="filterMonth=this.value; render();" class="form-input" style="font-size: 11px; padding: 6px 10px; max-width: 140px;">
              <option value="">Hamma oy</option>
              ${months.map(m => `<option value="${m}" ${filterMonth === m ? 'selected' : ''}>${m}</option>`).join('')}
            </select>
            <button class="btn btn-primary" onclick="openModal()" style="font-size: 11px;">+ Yangi</button>
          </div>
        </div>

        ${expenses.length === 0 ? `
          <div style="padding: 40px 20px; text-align: center; color: var(--text-tertiary);">
            <div style="font-size: 48px; margin-bottom: 12px;">💸</div>
            <h3 style="font-size: 15px; color: var(--text); margin: 0 0 6px 0;">Hozircha bo'sh</h3>
            <p style="font-size: 12px; margin: 0 0 16px 0;">${all.length > 0 ? "Filtr bo'yicha hech narsa topilmadi" : "Tashqi xarajatlarni qo'shing"}</p>
            ${all.length === 0 ? `<button class="btn btn-primary" onclick="openModal()" style="font-size: 12px;">+ Birinchisini qo'shish</button>` : ''}
          </div>
        ` : `
          <div class="table-wrapper" style="border: none;">
            <table class="table" style="font-size: 12px;">
              <thead>
                <tr>
                  <th>Sana</th>
                  <th>Kategoriya</th>
                  <th>Tavsif</th>
                  <th class="num">Summa</th>
                  <th>Eslatma</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                ${expenses.map((e) => {
                  // index in original array
                  const idx = all.findIndex(x => x.id === e.id);
                  return `
                    <tr>
                      <td>${fmtDate(e.date) || '—'}</td>
                      <td><span class="cat-badge ${categoryClass(e.category)}">${e.category || '—'}</span></td>
                      <td><strong>${e.description || '—'}</strong></td>
                      <td class="num num-negative" style="font-weight: 700;">${fmtMoney(e.amount || 0, cur)}</td>
                      <td style="font-size: 11px; color: var(--text-secondary); max-width: 200px; overflow: hidden; text-overflow: ellipsis;" title="${e.note || ''}">${e.note || ''}</td>
                      <td>
                        <button onclick="editItem(${idx})" style="background: none; border: 1px solid var(--blue); color: var(--blue); padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 10px;">✎</button>
                        <button onclick="deleteItem(${idx})" style="background: none; border: 1px solid var(--red); color: var(--red); padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 10px;">×</button>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
              <tfoot>
                <tr style="background: var(--gray-100); font-weight: 700;">
                  <td colspan="3">JAMI (${expenses.length} ta)</td>
                  <td class="num num-negative">${fmtMoney(filteredTotal, cur)}</td>
                  <td colspan="2"></td>
                </tr>
              </tfoot>
            </table>
          </div>
        `}
      </div>

      <div class="tip-box info" style="margin-top: 16px;">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round"/></svg>
        <div class="tip-content">
          <strong>Tashqi xarajatlar nima?</strong><br>
          Bu sizning <strong>WB'dan tashqaridagi</strong> xarajatlaringiz:<br>
          • <strong>Реклама</strong> — Instagram, Telegram, YouTube reklamasi<br>
          • <strong>Маркетинг</strong> — bloger, SMM, dizayn<br>
          • <strong>Закупка товара</strong> — tovar sotib olish<br>
          • <strong>Логистика</strong> — WB omborgacha logistika<br>
          • <strong>Налоги</strong> — IP soliqlari, fond to'lovlari<br>
          Sayt bularni <strong>Toza foyda</strong> hisobida ayiradi.
        </div>
      </div>
    `;
  }

  window.openModal = function() {
    editingId = null;
    document.getElementById('newDate').value = new Date().toISOString().substring(0, 10);
    document.getElementById('newCategory').value = 'Реклама';
    document.getElementById('newDescription').value = '';
    document.getElementById('newAmount').value = '';
    document.getElementById('newNote').value = '';
    document.getElementById('addModal').classList.add('show');
    setTimeout(() => document.getElementById('newDescription').focus(), 50);
  };

  window.closeModal = function() {
    document.getElementById('addModal').classList.remove('show');
  };

  window.editItem = function(idx) {
    const items = Storage.getExtExpenses();
    const item = items[idx];
    if (!item) return;
    editingId = idx;
    document.getElementById('newDate').value = item.date || '';
    document.getElementById('newCategory').value = item.category || 'Другое';
    document.getElementById('newDescription').value = item.description || '';
    document.getElementById('newAmount').value = item.amount || '';
    document.getElementById('newNote').value = item.note || '';
    document.getElementById('addModal').classList.add('show');
  };

  window.saveExpense = function() {
    const description = document.getElementById('newDescription').value.trim();
    const amount = parseFloat(document.getElementById('newAmount').value);
    if (!description || !amount) {
      alert('Tavsif va summa majburiy');
      return;
    }

    const item = {
      id: editingId !== null ? Storage.getExtExpenses()[editingId]?.id || Date.now() : Date.now(),
      date: document.getElementById('newDate').value,
      category: document.getElementById('newCategory').value,
      description,
      amount,
      note: document.getElementById('newNote').value.trim()
    };

    const items = Storage.getExtExpenses();
    if (editingId !== null) {
      items[editingId] = item;
    } else {
      items.push(item);
    }
    Storage.setExtExpenses(items);

    if (typeof Calculator !== 'undefined') Calculator.invalidate();

    notify(editingId !== null ? 'Yangilandi' : 'Qo\'shildi', 'success');
    closeModal();
    render();
  };

  window.deleteItem = function(idx) {
    if (!confirm('O\'chirasizmi?')) return;
    const items = Storage.getExtExpenses();
    items.splice(idx, 1);
    Storage.setExtExpenses(items);
    if (typeof Calculator !== 'undefined') Calculator.invalidate();
    notify('O\'chirildi', 'warning');
    render();
  };

  document.getElementById('addModal').addEventListener('click', e => {
    if (e.target.id === 'addModal') closeModal();
  });
</script>

</body>
</html>
