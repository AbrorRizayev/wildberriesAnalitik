<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRA — Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .dashboard-block { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px;
                     border: 1px solid var(--border-light); }
  .dashboard-block-header { display: flex; justify-content: space-between; align-items: baseline;
                            margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border-light); }
  .dashboard-block-title { font-size: 14px; font-weight: 600; color: var(--navy); }
  .dashboard-block-meta { font-size: 11px; color: var(--text-tertiary); }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  .metric { padding: 10px; background: var(--gray-50); border-radius: 6px; }
  .metric-label { font-size: 10px; color: var(--text-tertiary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
  .metric-value { font-size: 16px; font-weight: 700; color: var(--text); }
  .metric-extra { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
  .metric.success .metric-value { color: var(--green-dark); }
  .metric.danger .metric-value { color: var(--red-dark); }
  .metric.warning .metric-value { color: var(--amber-dark); }

  .big-stat { padding: 16px; background: linear-gradient(135deg, var(--navy), var(--blue)); border-radius: 12px; color: white; }
  .big-stat-label { font-size: 12px; opacity: 0.8; margin-bottom: 6px; }
  .big-stat-value { font-size: 28px; font-weight: 700; }
  .big-stat-extra { font-size: 11px; opacity: 0.9; margin-top: 4px; }

  .breakdown-row { display: flex; align-items: center; gap: 10px; padding: 6px 0;
                   border-bottom: 1px dashed var(--border-light); font-size: 12px; }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-label { flex: 1; color: var(--text-secondary); }
  .breakdown-value { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
  .breakdown-pct { color: var(--text-tertiary); font-size: 11px; min-width: 50px; text-align: right; }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="page">

      <div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
          <h1 class="page-title">Dashboard</h1>
          <p class="page-subtitle">Asosiy ko'rsatkichlar — sizning Excel Dashboard'ingiz kabi</p>
        </div>
        <div id="filterBar"></div>
      </div>

      <div id="capWarning"></div>
      <div id="content"></div>

    </main>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/app-init.js"></script>
<script src="js/baza-formulas.js"></script>
<script src="js/calculator.js"></script>
<script src="js/main.js"></script>

<script>
  window.initPage = function() {
setupLayout('dashboard');

  const base = Storage.getBase();
  const settings = Storage.getSettings();
  const cur = settings.currency;
  const content = document.getElementById('content');
  const filterBar = document.getElementById('filterBar');

  // ============ Капитализация ogohlantirishi ============
  renderCapWarning();

  function renderCapWarning() {
    const stock = Storage.getCapStock() || [];
    const sales = Storage.getCapSales() || [];
    const warn = document.getElementById('capWarning');
    if (!warn || stock.length === 0 || sales.length === 0) {
      if (warn) warn.innerHTML = '';
      return;
    }
    const params = Storage.getCapParams();
    const days = Number(params.days_of_sales) || 7;
    const deliveryDays = Number(params.delivery_days) || 7;

    // Quick scan: faqat red signal sonini hisoblaymiz
    const salesByBarcode = {};
    for (const s of sales) {
      const bc = String(s.barcode || '');
      if (!bc) continue;
      salesByBarcode[bc] = (salesByBarcode[bc] || 0) + (Number(s.ordered) || 0);
    }
    const lowItems = [];
    for (const s of stock) {
      const bc = String(s.barcode || '');
      if (!bc) continue;
      const stockTotal = (Number(s.returns_en_route) || 0) + (Number(s.total_in_warehouses) || 0);
      const ordered = salesByBarcode[bc] || 0;
      if (ordered === 0) continue;
      const avgPerDay = ordered / days;
      const daysLeft = avgPerDay > 0 ? stockTotal / avgPerDay : null;
      if (daysLeft !== null && daysLeft < deliveryDays) {
        lowItems.push({ article: s.article, size: s.size, daysLeft: Math.round(daysLeft) });
      }
    }
    if (lowItems.length === 0) return;
    // Top 5 most urgent
    lowItems.sort((a, b) => a.daysLeft - b.daysLeft);
    const top = lowItems.slice(0, 5);

    warn.innerHTML = `
      <div style="background: linear-gradient(135deg, #A32D2D 0%, #6E1F1F 100%); color: white; border-radius: 12px; padding: 18px 22px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 12px rgba(163, 45, 45, 0.2);">
        <div style="font-size: 32px;">⚠</div>
        <div style="flex: 1;">
          <div style="font-size: 14px; font-weight: 700; margin-bottom: 6px;">Tezda tugaydi: ${lowItems.length} ta artikul</div>
          <div style="font-size: 11px; opacity: 0.9;">
            ${top.map(i => `<span style="background: rgba(255,255,255,0.18); padding: 3px 8px; border-radius: 4px; margin-right: 6px; display: inline-block; margin-top: 4px;">${i.article}${i.size ? ' (' + i.size + ')' : ''} — ${i.daysLeft} kun</span>`).join('')}
            ${lowItems.length > 5 ? `<span style="opacity: 0.7; margin-left: 6px;">+${lowItems.length - 5} ta...</span>` : ''}
          </div>
        </div>
        <a href="capitalization.html" style="background: white; color: #A32D2D; padding: 10px 18px; border-radius: 8px; font-weight: 700; font-size: 12px; text-decoration: none; white-space: nowrap;">📦 Buyurtma →</a>
      </div>
    `;
  }

  if (base.length === 0) {
    renderEmpty(content, {
      icon: '📊',
      title: 'Dashboard bo\'sh',
      message: 'Avval Список отчётов va Подробный отчёt yuklang',
      link: 'upload.html',
      linkText: '📤 Yuklash sahifasi'
    });
  } else {
    // Filtrlar
    const uniqueReports = [...new Set(base.map(r => r.report_num))].filter(Boolean).sort();
    const uniqueMonths = [...new Set(base.map(r => r.sale_date ? r.sale_date.substring(0, 7) : null))].filter(Boolean).sort();

    let filterReport = '';
    let filterMonth = '';

    filterBar.innerHTML = `
      <div style="display: flex; gap: 8px; align-items: center;">
        <span style="font-size: 11px; color: var(--text-tertiary); font-weight: 600;">FILTR:</span>
        <select class="form-input" id="filterReport" style="font-size: 11px; padding: 6px 8px;">
          <option value="">Hamma achotlar</option>
          ${uniqueReports.map(rn => `<option value="${rn}">№ ${rn}</option>`).join('')}
        </select>
        <select class="form-input" id="filterMonth" style="font-size: 11px; padding: 6px 8px;">
          <option value="">Hamma oylar</option>
          ${uniqueMonths.map(m => `<option value="${m}">${m}</option>`).join('')}
        </select>
      </div>
    `;

    function getFiltered() {
      let filtered = baseCalculated;
      if (filterReport) filtered = filtered.filter(r => String(r.report_num) === String(filterReport));
      if (filterMonth) filtered = filtered.filter(r => r.sale_date && r.sale_date.startsWith(filterMonth));
      return filtered;
    }

    let baseCalculated = [];  // ⭐ Cache'lanan
    let ctx = null;

    async function ensureCalculated() {
      if (baseCalculated.length > 0) return;

      ctx = {
        costs: Storage.getCosts(),
        settings,
        samovikupy: Storage.getSelfPurchases(),
        extExpenses: Storage.getExtExpenses(),
        listReports: Storage.getListReports()
      };

      // Katta baza bo'lsa progress ko'rsatamiz
      const baseLen = Storage.getBase().length;
      const showProgress = baseLen > 10000;

      if (showProgress) {
        Calculator.showProgress();
        try {
          baseCalculated = await Calculator.getCalculated((current, total, pct) => {
            Calculator.updateProgress(current, total, pct);
          });
        } finally {
          Calculator.hideProgress();
        }
      } else {
        baseCalculated = await Calculator.getCalculated();
      }
    }

    async function render() {
      await ensureCalculated();
      const filtered = getFiltered();

      // Har bir qator uchun hisoblash (ENDI cache'dan keladi)
      const calculated = filtered;

      const kpi = BazaFormulas.calculateKPI(calculated, ctx);
      const products = BazaFormulas.byProduct(calculated);
      const weeks = BazaFormulas.byWeek(calculated);
      const warehouses = BazaFormulas.byWarehouse(calculated);

      content.innerHTML = `

        <!-- ASOSIY KPI'lar (3 ta katta) -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-bottom: 16px;">
          <div class="big-stat" style="background: linear-gradient(135deg, var(--navy), var(--blue));">
            <div class="big-stat-label">💰 Daromad (Выручка)</div>
            <div class="big-stat-value">${fmtMoneyShort(kpi.revenue, cur)}</div>
            <div class="big-stat-extra">${fmt(kpi.sales_qty)} dona sotilgan</div>
          </div>

          <div class="big-stat" style="background: linear-gradient(135deg, ${kpi.net_profit >= 0 ? 'var(--green-dark), var(--green)' : 'var(--red-dark), var(--red)'});">
            <div class="big-stat-label">${kpi.net_profit >= 0 ? '✅' : '⚠️'} Toza foyda</div>
            <div class="big-stat-value">${fmtMoneyShort(kpi.net_profit, cur)}</div>
            <div class="big-stat-extra">Marja ${fmtPercent(kpi.margin_pct)} · ROI ${fmtPercent(kpi.roi_pct)}</div>
          </div>

          <div class="big-stat" style="background: linear-gradient(135deg, var(--amber-dark), var(--amber));">
            <div class="big-stat-label">💸 WB ushlanmalari</div>
            <div class="big-stat-value">${fmtMoneyShort(kpi.all_wb_deductions, cur)}</div>
            <div class="big-stat-extra">${fmtPercent(kpi.all_ded_pct)} daromaddan</div>
          </div>
        </div>

        <!-- Bloklar -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 12px;">

          <!-- Sotuvlar bloki -->
          <div class="dashboard-block">
            <div class="dashboard-block-header">
              <div class="dashboard-block-title">📦 Sotuvlar (Продажи)</div>
              <div class="dashboard-block-meta">${fmt(filtered.length)} qator</div>
            </div>
            <div class="metric-grid">
              <div class="metric">
                <div class="metric-label">Sotilgan</div>
                <div class="metric-value">${fmt(kpi.sales_qty)}</div>
                <div class="metric-extra">dona</div>
              </div>
              <div class="metric">
                <div class="metric-label">Sotuv summasi</div>
                <div class="metric-value">${fmtMoneyShort(kpi.sales_rub, cur)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Qaytarishlar</div>
                <div class="metric-value">${fmt(kpi.returns_qty)}</div>
                <div class="metric-extra">${fmtMoneyShort(kpi.returns_rub, cur)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Buyout %</div>
                <div class="metric-value">${fmtPercent(kpi.buyout_pct)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">O'rtacha chek</div>
                <div class="metric-value">${fmtMoney(kpi.avg_price, cur)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">СПП</div>
                <div class="metric-value">${fmtPercent(kpi.spp_pct)}</div>
              </div>
            </div>
          </div>

          <!-- Moliya bloki -->
          <div class="dashboard-block">
            <div class="dashboard-block-header">
              <div class="dashboard-block-title">💵 Moliya (Финансы)</div>
              <div class="dashboard-block-meta">Excel J, K, L, Y formulalari</div>
            </div>
            <div class="metric-grid">
              <div class="metric success">
                <div class="metric-label">Оплата на РС</div>
                <div class="metric-value">${fmtMoneyShort(kpi.to_pay_rs, cur)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">WB реализовал</div>
                <div class="metric-value">${fmtMoneyShort(kpi.wb_realized, cur)}</div>
                <div class="metric-extra">с учётом СПП</div>
              </div>
              <div class="metric danger">
                <div class="metric-label">Tannarx (СС)</div>
                <div class="metric-value">${fmtMoneyShort(kpi.cost, cur)}</div>
                <div class="metric-extra">${fmtPercent(kpi.cost_pct)} daromaddan</div>
              </div>
              <div class="metric warning">
                <div class="metric-label">Soliq (${settings.tax_rate}%)</div>
                <div class="metric-value">${fmtMoneyShort(kpi.tax, cur)}</div>
                <div class="metric-extra">${settings.tax_type_name}</div>
              </div>
              <div class="metric ${kpi.net_profit >= 0 ? 'success' : 'danger'}">
                <div class="metric-label">Toza foyda</div>
                <div class="metric-value">${fmtMoneyShort(kpi.net_profit, cur)}</div>
                <div class="metric-extra">${fmtPercent(kpi.margin_pct)} marja</div>
              </div>
              <div class="metric">
                <div class="metric-label">ROI</div>
                <div class="metric-value">${fmtPercent(kpi.roi_pct)}</div>
              </div>
            </div>
          </div>

          <!-- WB ushlanmalar -->
          <div class="dashboard-block">
            <div class="dashboard-block-header">
              <div class="dashboard-block-title">🏛 WB ushlanmalar batafsil</div>
              <div class="dashboard-block-meta">Excel K, L, S+T, AD</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Komissiya</div>
              <div class="breakdown-value">${fmtMoney(kpi.commission, cur)}</div>
              <div class="breakdown-pct">${fmtPercent(kpi.commission_pct)}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Logistika (jami)</div>
              <div class="breakdown-value">${fmtMoney(kpi.logistics_total, cur)}</div>
              <div class="breakdown-pct">${fmtPercent(kpi.logistics_pct)}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Ekvayring</div>
              <div class="breakdown-value">${fmtMoney(kpi.acquiring, cur)}</div>
              <div class="breakdown-pct">${kpi.revenue > 0 ? fmtPercent(kpi.acquiring / kpi.revenue * 100) : '—'}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Saqlash</div>
              <div class="breakdown-value">${fmtMoney(kpi.storage, cur)}</div>
              <div class="breakdown-pct">${fmtPercent(kpi.storage_pct)}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Shtraflar</div>
              <div class="breakdown-value">${fmtMoney(kpi.fines, cur)}</div>
              <div class="breakdown-pct">${kpi.revenue > 0 ? fmtPercent(kpi.fines / kpi.revenue * 100) : '—'}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">ВБ.Продвижение</div>
              <div class="breakdown-value">${fmtMoney(kpi.promotion, cur)}</div>
              <div class="breakdown-pct">${kpi.revenue > 0 ? fmtPercent(kpi.promotion / kpi.revenue * 100) : '—'}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Plat. priyomka</div>
              <div class="breakdown-value">${fmtMoney(kpi.paid_reception, cur)}</div>
              <div class="breakdown-pct">${kpi.revenue > 0 ? fmtPercent(kpi.paid_reception / kpi.revenue * 100) : '—'}</div>
            </div>
            <div class="breakdown-row" style="border-top: 2px solid var(--border); margin-top: 6px; padding-top: 8px;">
              <div class="breakdown-label" style="font-weight: 700; color: var(--text);">JAMI</div>
              <div class="breakdown-value" style="font-weight: 700; color: var(--red-dark);">${fmtMoney(kpi.all_wb_deductions, cur)}</div>
              <div class="breakdown-pct" style="font-weight: 700;">${fmtPercent(kpi.all_ded_pct)}</div>
            </div>
          </div>

          <!-- Soliq va xarajatlar -->
          <div class="dashboard-block">
            <div class="dashboard-block-header">
              <div class="dashboard-block-title">📑 Soliq va xarajatlar</div>
              <div class="dashboard-block-meta">Excel AA, AB, AC, AN</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Tannarx</div>
              <div class="breakdown-value">${fmtMoney(kpi.cost, cur)}</div>
              <div class="breakdown-pct">${fmtPercent(kpi.cost_pct)}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Soliq bazasi</div>
              <div class="breakdown-value">${fmtMoney(kpi.tax_base, cur)}</div>
              <div class="breakdown-pct">${settings.tax_type_name}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Soliq summa (${settings.tax_rate}%)</div>
              <div class="breakdown-value" style="color: var(--amber-dark);">${fmtMoney(kpi.tax, cur)}</div>
              <div class="breakdown-pct">—</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Tashqi xarajatlar</div>
              <div class="breakdown-value">${fmtMoney(kpi.ext_expenses, cur)}</div>
              <div class="breakdown-pct">—</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Samovikup xarajati</div>
              <div class="breakdown-value">${fmtMoney(kpi.samovikup_costs, cur)}</div>
              <div class="breakdown-pct">—</div>
            </div>
            <div class="breakdown-row" style="border-top: 2px solid var(--border); margin-top: 6px; padding-top: 8px;">
              <div class="breakdown-label" style="font-weight: 700; color: var(--text);">Toza foyda</div>
              <div class="breakdown-value" style="font-weight: 700; color: ${kpi.net_profit >= 0 ? 'var(--green-dark)' : 'var(--red-dark)'};">${fmtMoney(kpi.net_profit, cur)}</div>
              <div class="breakdown-pct" style="font-weight: 700;">${fmtPercent(kpi.margin_pct)}</div>
            </div>
          </div>
        </div>

        <!-- Top tovarlar -->
        <div class="dashboard-block" style="margin-top: 16px;">
          <div class="dashboard-block-header">
            <div class="dashboard-block-title">🏆 Top tovarlar (daromad bo'yicha)</div>
            <a href="products.html" class="text-blue" style="font-size: 12px; text-decoration: none;">Hammasi →</a>
          </div>
          <div class="table-wrapper" style="border: none;">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Artikul</th>
                  <th>Tovar</th>
                  <th class="num">Sotuvlar</th>
                  <th class="num">Daromad</th>
                  <th class="num">Tannarx</th>
                  <th class="num">Foyda</th>
                  <th class="num">Marja</th>
                </tr>
              </thead>
              <tbody>
                ${products.slice(0, 10).map((p, i) => `
                  <tr>
                    <td>${i + 1}</td>
                    <td><strong>${p.article}</strong></td>
                    <td style="max-width: 250px; overflow: hidden; text-overflow: ellipsis;" title="${p.product}">${(p.product || '').substring(0, 35)}${p.product && p.product.length > 35 ? '…' : ''}</td>
                    <td class="num">${fmt(p.qty)}</td>
                    <td class="num num-positive">${fmtMoney(p.revenue, cur)}</td>
                    <td class="num num-negative">${fmtMoney(p.cost, cur)}</td>
                    <td class="num ${p.profit >= 0 ? 'num-positive' : 'num-negative'}">${fmtMoney(p.profit, cur)}</td>
                    <td class="num">${fmtPercent(p.margin_pct)}</td>
                  </tr>
                `).join('')}
                ${products.length === 0 ? `<tr><td colspan="8" style="text-align: center; padding: 20px; color: var(--text-tertiary);">Tovarlar yo'q</td></tr>` : ''}
              </tbody>
            </table>
          </div>
        </div>

        <!-- Sklad bo'yicha sotuvlar -->
        ${warehouses.length > 1 ? `
        <div class="dashboard-block" style="margin-top: 16px;">
          <div class="dashboard-block-header">
            <div>
              <div class="dashboard-block-title">🏬 Sklad bo'yicha sotuvlar</div>
              <div style="font-size: 11px; color: var(--text-tertiary); margin-top: 2px;">${fmt(warehouses.length)} ta sklad · Выручка bo'yicha tartiblangan</div>
            </div>
            <button class="btn btn-outline" onclick="exportWarehouseCsv()" style="font-size: 11px;">📥 CSV</button>
          </div>
          <div class="table-wrapper" style="border: none;">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>🏬 Sklad</th>
                  <th class="num">Sotuvlar (dona)</th>
                  <th class="num">Qaytarish (dona)</th>
                  <th class="num">Toza (dona)</th>
                  <th class="num">Выручка</th>
                  <th class="num">Qayt. %</th>
                  <th class="num">% jamidan</th>
                </tr>
              </thead>
              <tbody>
                ${warehouses.map((w, i) => {
                  const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}`;
                  // Qaytarish % rang: <5% yashil, 5-15% sariq, >15% qizil
                  const retClass = w.return_pct < 5 ? 'num-positive' : w.return_pct < 15 ? '' : 'num-negative';
                  const retStyle = w.return_pct >= 5 && w.return_pct < 15 ? 'color: #c89a00;' : '';
                  return `
                    <tr>
                      <td style="font-weight: 700; font-size: 13px;">${medal}</td>
                      <td><strong>${w.warehouse}</strong></td>
                      <td class="num">${fmt(w.sold_qty)}</td>
                      <td class="num ${w.returns_qty > 0 ? 'num-negative' : ''}">${fmt(w.returns_qty)}</td>
                      <td class="num num-positive"><strong>${fmt(w.net_qty)}</strong></td>
                      <td class="num"><strong>${fmtMoney(w.revenue, cur)}</strong></td>
                      <td class="num ${retClass}" style="${retStyle}">${w.sold_qty > 0 ? w.return_pct.toFixed(1) + '%' : '—'}</td>
                      <td class="num" style="color: var(--text-tertiary);">${w.share_pct.toFixed(1)}%</td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
              <tfoot>
                <tr style="background: var(--gray-100); font-weight: 700;">
                  <td colspan="2">JAMI</td>
                  <td class="num">${fmt(warehouses.reduce((s, w) => s + w.sold_qty, 0))}</td>
                  <td class="num num-negative">${fmt(warehouses.reduce((s, w) => s + w.returns_qty, 0))}</td>
                  <td class="num num-positive">${fmt(warehouses.reduce((s, w) => s + w.net_qty, 0))}</td>
                  <td class="num">${fmtMoney(warehouses.reduce((s, w) => s + w.revenue, 0), cur)}</td>
                  <td class="num">—</td>
                  <td class="num">100%</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
        ` : ''}

        <!-- Haftalik -->
        ${weeks.length > 0 ? `
        <div class="dashboard-block">
          <div class="dashboard-block-header">
            <div class="dashboard-block-title">📅 Haftalik P&L</div>
            <a href="pnl.html" class="text-blue" style="font-size: 12px; text-decoration: none;">To'liq P&L →</a>
          </div>
          <div class="table-wrapper" style="border: none;">
            <table class="table">
              <thead>
                <tr>
                  <th>Hafta</th>
                  <th class="num">Sotuvlar</th>
                  <th class="num">Daromad</th>
                  <th class="num">WB ush.</th>
                  <th class="num">Tannarx</th>
                  <th class="num">Soliq</th>
                  <th class="num">Foyda</th>
                  <th class="num">Marja</th>
                </tr>
              </thead>
              <tbody>
                ${weeks.map(w => `
                  <tr>
                    <td><strong>${fmtDate(w.week)}</strong></td>
                    <td class="num">${fmt(w.qty)}</td>
                    <td class="num num-positive">${fmtMoney(w.revenue, cur)}</td>
                    <td class="num num-negative">${fmtMoney(w.commission + w.acquiring + w.logistics + w.storage + w.fines + w.promotion, cur)}</td>
                    <td class="num num-negative">${fmtMoney(w.cost, cur)}</td>
                    <td class="num num-negative">${fmtMoney(w.tax, cur)}</td>
                    <td class="num ${w.profit >= 0 ? 'num-positive' : 'num-negative'}" style="font-weight: 600;">${fmtMoney(w.profit, cur)}</td>
                    <td class="num">${fmtPercent(w.margin_pct)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
        ` : ''}
      `;

      // Filter listeners
      const fr = document.getElementById('filterReport');
      const fm = document.getElementById('filterMonth');
      if (fr) fr.addEventListener('change', e => { filterReport = e.target.value; render(); });
      if (fm) fm.addEventListener('change', e => { filterMonth = e.target.value; render(); });

      // Sklad CSV eksport
      window.exportWarehouseCsv = function() {
        if (!warehouses || warehouses.length === 0) return;
        const header = ['#', 'Sklad', 'Sotuvlar (dona)', 'Qaytarish (dona)', 'Toza (dona)', 'Vyruchka', 'Qaytarish %', '% jamidan'];
        const rows = warehouses.map((w, i) => [
          i + 1,
          w.warehouse,
          w.sold_qty,
          w.returns_qty,
          w.net_qty,
          w.revenue.toFixed(2),
          w.return_pct.toFixed(2) + '%',
          w.share_pct.toFixed(2) + '%'
        ]);
        const csv = [header, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `aira-warehouses-${new Date().toISOString().substring(0, 10)}.csv`;
        a.click();
      };
    }

    render();
  }
  };
</script>

</body>
</html>
