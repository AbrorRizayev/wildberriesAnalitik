<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRA — Tovarlar</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="page">

      <div class="page-header">
        <h1 class="page-title">Tovarlar bo'yicha hisobot</h1>
        <p class="page-subtitle">Har bir tovar uchun batafsil tahlil — sizning Excel "Отчёт по товарам" varagi kabi</p>
      </div>

      <div id="content"></div>

    </main>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/app-init.js"></script>
<script src="js/baza-formulas.js"></script>
<script src="js/calculator.js"></script>
<script src="js/main.js"></script>

<script>
  window.initPage = function() {
setupLayout('products');

  const base = Storage.getBase();
  const settings = Storage.getSettings();
  const cur = settings.currency;
  const content = document.getElementById('content');

  if (base.length === 0) {
    renderEmpty(content, {
      icon: '📦',
      title: 'Tovarlar yo\'q',
      message: 'Avval Подробный отчёt yuklang',
      link: 'upload.html',
      linkText: '📤 Yuklash'
    });
  } else {
    const ctx = {
      costs: Storage.getCosts(),
      settings,
      samovikupy: Storage.getSelfPurchases(),
      extExpenses: Storage.getExtExpenses(),
      listReports: Storage.getListReports()
    };
    // Asinx hisoblash (cache bilan)
    (async function() {
      const baseLen = base.length;
      const showProgress = baseLen > 10000;

      let calculated;
      if (showProgress) {
        Calculator.showProgress();
        try {
          calculated = await Calculator.getCalculated((current, total, pct) => {
            Calculator.updateProgress(current, total, pct);
          });
        } finally {
          Calculator.hideProgress();
        }
      } else {
        calculated = await Calculator.getCalculated();
      }
      window._calculated = calculated;
      renderMain();
    })();

    function renderMain() {
      const calculated = window._calculated;
    const products = BazaFormulas.byProduct(calculated);

    let searchText = '';
    let sortBy = 'revenue';
    let groupMode = false; // false = alohida (default), true = guruh bo'yicha

    // Artikul → guruh nomi (birinchi tire'gacha; tiresiz bo'lsa to'liq)
    function getGroup(article) {
      if (!article) return 'unknown';
      const s = String(article).trim();
      const idx = s.indexOf('-');
      return idx > 0 ? s.substring(0, idx).trim() : s;
    }

    // Tovarlarni guruhlash (artikul ranglari/razmerlari birga)
    function groupProducts(arr) {
      const map = {};
      for (const p of arr) {
        const key = getGroup(p.article);
        if (!map[key]) {
          map[key] = {
            article: key,
            product: p.product || '',
            brand: p.brand || '',
            size: '',
            group: p.group || '',
            buyouts_qty: 0, qty: 0, returns_qty: 0, returns_rub: 0,
            revenue: 0,
            commission: 0, logistics: 0, storage: 0,
            promotion: 0, fines: 0,
            cost: 0, tax: 0,
            to_pay_rs: 0, profit: 0,
            cashback: 0, cancellations: 0,
            spp_total: 0,
            variant_count: 0
          };
        }
        const g = map[key];
        g.buyouts_qty += p.buyouts_qty || 0;
        g.qty += p.qty || 0;
        g.returns_qty += p.returns_qty || 0;
        g.returns_rub += p.returns_rub || 0;
        g.revenue += p.revenue || 0;
        g.commission += p.commission || 0;
        g.logistics += p.logistics || 0;
        g.storage += p.storage || 0;
        g.promotion += p.promotion || 0;
        g.fines += p.fines || 0;
        g.cost += p.cost || 0;
        g.tax += p.tax || 0;
        g.to_pay_rs += p.to_pay_rs || 0;
        g.profit += p.profit || 0;
        g.cashback += p.cashback || 0;
        g.cancellations += p.cancellations || 0;
        g.spp_total += p.spp_total || 0;
        g.variant_count++;
      }
      const result = Object.values(map);
      for (const g of result) {
        g.margin_pct = g.revenue > 0 ? (g.profit / g.revenue * 100) : 0;
        g.roi_pct = g.cost > 0 ? (g.profit / g.cost * 100) : 0;
        g.spp_pct = g.revenue > 0 ? (g.spp_total / g.revenue * 100) : 0;
      }
      return result;
    }

    // ====== Static shell — bir marta chiziladi (search input qayta tug'ilmaydi) ======
    content.innerHTML = `
      <div id="kpisBlock"></div>

      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Tovarlar reytingi</div>
            <div class="card-subtitle" id="cardSubtitle"></div>
          </div>
          <button class="btn btn-outline" onclick="exportCsv()" style="font-size: 11px;">📥 CSV</button>
        </div>

        <div class="filters">
          <div class="filter-group">
            <span class="filter-label">Saralash:</span>
            <select class="filter-select" id="sortBy">
              <option value="revenue">Daromad bo'yicha</option>
              <option value="profit">Foyda bo'yicha</option>
              <option value="qty">Sotuvlar bo'yicha</option>
              <option value="cost">Tannarx bo'yicha</option>
            </select>
          </div>
          <div class="filter-group">
            <span class="filter-label">Ko'rinish:</span>
            <button id="groupToggle" type="button" style="padding: 7px 14px; border: 1px solid var(--border); background: white; border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--text-secondary); cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s;">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              <span id="groupToggleLabel">Alohida</span>
            </button>
          </div>
          <div class="search-box" style="flex: 1; max-width: 280px;">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round"/></svg>
            <input type="text" id="searchInput" placeholder="Artikul yoki tovar...">
          </div>
        </div>

        <div class="table-wrapper" id="tableWrapper" style="border: none; overflow-x: auto; max-height: 75vh;"></div>
      </div>
    `;

    // ====== Eventlar — bir marta o'rnatiladi ======
    const sortByEl = document.getElementById('sortBy');
    const searchEl = document.getElementById('searchInput');
    const groupBtn = document.getElementById('groupToggle');
    const groupLabel = document.getElementById('groupToggleLabel');

    sortByEl.value = sortBy;
    sortByEl.addEventListener('change', e => { sortBy = e.target.value; renderInner(); });
    searchEl.addEventListener('input', e => { searchText = e.target.value; renderInner(); });
    groupBtn.addEventListener('click', () => {
      groupMode = !groupMode;
      groupLabel.textContent = groupMode ? 'Guruh bo\'yicha' : 'Alohida';
      groupBtn.style.background = groupMode ? 'var(--blue-bg)' : 'white';
      groupBtn.style.color = groupMode ? 'var(--blue)' : 'var(--text-secondary)';
      groupBtn.style.borderColor = groupMode ? 'var(--blue)' : 'var(--border)';
      renderInner();
    });

    // ====== Inner render — faqat KPI va jadval, search input qayta tug'ilmaydi ======
    function renderInner() {
      const source = groupMode ? groupProducts(products) : products;
      let filtered = source;
      if (searchText) {
        const q = searchText.toLowerCase();
        filtered = filtered.filter(p =>
          String(p.article || '').toLowerCase().includes(q) ||
          String(p.product || '').toLowerCase().includes(q)
        );
      }
      filtered = [...filtered].sort((a, b) => Math.abs(b[sortBy] || 0) - Math.abs(a[sortBy] || 0));

      const totals = filtered.reduce((acc, p) => {
        acc.qty += p.qty;
        acc.returns_qty += p.returns_qty;
        acc.revenue += p.revenue;
        acc.cost += p.cost;
        acc.profit += p.profit;
        return acc;
      }, { qty: 0, returns_qty: 0, revenue: 0, cost: 0, profit: 0 });

      // ----- KPI block -----
      document.getElementById('kpisBlock').innerHTML = `
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-label">${groupMode ? "Guruhlar soni" : "Tovarlar soni"}</div>
            <div class="kpi-value">${filtered.length}</div>
            <div class="kpi-change">${source.length === filtered.length ? '' : `jami ${source.length} dan`}</div>
          </div>
          <div class="kpi-card success">
            <div class="kpi-label">Jami sotuvlar</div>
            <div class="kpi-value">${fmt(totals.qty)}</div>
          </div>
          <div class="kpi-card success">
            <div class="kpi-label">Jami daromad</div>
            <div class="kpi-value">${fmtMoneyShort(totals.revenue, cur)}</div>
          </div>
          <div class="kpi-card ${totals.profit >= 0 ? 'success' : 'danger'}">
            <div class="kpi-label">Jami foyda</div>
            <div class="kpi-value">${fmtMoneyShort(totals.profit, cur)}</div>
            <div class="kpi-change">Marja ${totals.revenue > 0 ? fmtPercent(totals.profit / totals.revenue * 100) : '—'}</div>
          </div>
        </div>
      `;

      document.getElementById('cardSubtitle').textContent =
        `${filtered.length} ta ${groupMode ? 'guruh' : 'tovar'}`;

      // ----- Table -----
      document.getElementById('tableWrapper').innerHTML = `
        <table class="table" style="font-size: 11px; min-width: 1600px;">
              <thead style="position: sticky; top: 0; z-index: 10;">
                <tr>
                  <th rowspan="2" style="background: var(--gray-100); color: var(--text); border-bottom: 1px solid var(--border); width: 36px;">#</th>
                  <th rowspan="2" style="background: var(--gray-100); color: var(--text); border-bottom: 1px solid var(--border); min-width: 90px;">Brend</th>
                  <th rowspan="2" style="background: var(--gray-100); color: var(--text); border-bottom: 1px solid var(--border); min-width: 130px;">${groupMode ? "Guruh" : "Artikul"}</th>
                  <th rowspan="2" style="background: var(--gray-100); color: var(--text); border-bottom: 1px solid var(--border); min-width: 200px;">Tovar</th>
                  <th colspan="12" style="background: linear-gradient(135deg, #0F6E56, #095440); color: white; text-align: center; padding: 10px; font-size: 12px; font-weight: 700; letter-spacing: 0.3px;">📦 ПРОДАЖИ</th>
                  <th colspan="5" style="background: linear-gradient(135deg, #A32D2D, #6E1F1F); color: white; text-align: center; padding: 10px; font-size: 12px; font-weight: 700; letter-spacing: 0.3px;">📦 WB УШЛАНМАЛАРИ</th>
                  <th colspan="5" style="background: linear-gradient(135deg, #185FA5, #042C53); color: white; text-align: center; padding: 10px; font-size: 12px; font-weight: 700; letter-spacing: 0.3px;">💰 ФОЙДА</th>
                </tr>
                <tr>
                  <th class="num" title="Vykupy shtuk" style="color: var(--green-dark); font-weight: 600; padding: 8px 6px;">Выкупы шт.</th>
                  <th class="num" title="Vykupy summa" style="color: var(--green-dark); font-weight: 600; padding: 8px 6px;">Выкупы руб.</th>
                  <th class="num" title="Vozvraty shtuk" style="color: var(--red-dark); padding: 8px 6px;">Возвр. шт.</th>
                  <th class="num" title="Vozvraty summa" style="color: var(--red-dark); padding: 8px 6px;">Возвр. руб.</th>
                  <th class="num" title="Net sales (Выкупы - Возвраты)" style="color: var(--navy); font-weight: 700; padding: 8px 6px;">Продажи шт.</th>
                  <th class="num" title="Toza daromad" style="color: var(--navy); font-weight: 700; padding: 8px 6px;">Выручка</th>
                  <th class="num" title="Средняя цена сотuv 1 dona uchun" style="color: var(--text-secondary); padding: 8px 6px;">Цена / шт</th>
                  <th class="num" title="К получению за 1 dona (Выручка − Комиссия − Логистика) / Продажи" style="color: var(--green-dark); font-weight: 600; padding: 8px 6px; background: rgba(15, 110, 86, 0.06);">К получ. / шт</th>
                  <th class="num" title="СПП %" style="color: var(--text-secondary); padding: 8px 6px;">СПП %</th>
                  <th class="num" title="Отмены и невыкупы" style="color: var(--text-secondary); padding: 8px 6px;">Отмены</th>
                  <th class="num" title="Buyout %" style="color: var(--text-secondary); padding: 8px 6px;">Выкуп %</th>
                  <th class="num" title="Cashback" style="color: var(--text-secondary); padding: 8px 6px;">Cashback</th>
                  <th class="num" title="Komissiya" style="color: var(--red-dark); padding: 8px 6px;">Komissiya</th>
                  <th class="num" title="Logistika" style="color: var(--red-dark); padding: 8px 6px;">Logistika</th>
                  <th class="num" title="Saqlash" style="color: var(--red-dark); padding: 8px 6px;">Saqlash</th>
                  <th class="num" title="Reklama" style="color: var(--red-dark); padding: 8px 6px;">Reklama</th>
                  <th class="num" title="Shtraflar" style="color: var(--red-dark); padding: 8px 6px;">Shtraflar</th>
                  <th class="num" title="Tannarx" style="color: var(--navy); padding: 8px 6px;">Tannarx</th>
                  <th class="num" title="Soliq" style="color: var(--navy); padding: 8px 6px;">Soliq</th>
                  <th class="num" title="Toza foyda jami" style="color: var(--navy); font-weight: 700; padding: 8px 6px;">Foyda</th>
                  <th class="num" title="Har dona uchun marja: so'mda va foizda" style="color: var(--navy); padding: 8px 6px;">Marja / шт</th>
                  <th class="num" title="ROI %" style="color: var(--navy); padding: 8px 6px;">ROI</th>
                </tr>
              </thead>
              <tbody>
                ${filtered.map((p, i) => {
                  const buyoutPct = (p.buyouts_qty + p.returns_qty) > 0 ? (p.buyouts_qty / (p.buyouts_qty + p.returns_qty) * 100) : 0;
                  const cashback = p.cashback || 0;
                  const avgPrice = p.qty > 0 ? p.revenue / p.qty : 0;
                  const netPerPiece = p.qty > 0 ? (p.revenue - (p.commission || 0) - (p.logistics || 0)) / p.qty : 0;
                  const marjaPerPiece = p.qty > 0 ? p.profit / p.qty : 0;
                  const marjaPctColor = p.margin_pct >= 0 ? 'var(--green-dark)' : 'var(--red-dark)';
                  const groupBadge = groupMode && p.variant_count > 1 ? `<span style="display: inline-block; padding: 1px 6px; background: var(--blue-bg); color: var(--blue); border-radius: 4px; font-size: 9px; font-weight: 700; margin-left: 4px;">${p.variant_count}×</span>` : '';
                  return `
                  <tr>
                    <td>${i + 1}</td>
                    <td style="font-size: 10px;">${p.brand || '—'}</td>
                    <td><strong style="color: var(--blue);">${p.article}</strong>${groupBadge}</td>
                    <td style="max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${p.product || ''}">${(p.product || '').substring(0, 30)}${p.product && p.product.length > 30 ? '…' : ''}</td>
                    <td class="num" style="background: var(--green-light);">${fmt(p.buyouts_qty)}</td>
                    <td class="num">${fmtMoney(p.revenue + (p.returns_rub || 0), cur)}</td>
                    <td class="num" style="color: var(--red-dark);">${fmt(p.returns_qty)}</td>
                    <td class="num" style="color: var(--red-dark);">${fmtMoney(p.returns_rub || 0, cur)}</td>
                    <td class="num" style="background: var(--blue-bg); font-weight: 600;">${fmt(p.qty)}</td>
                    <td class="num num-positive" style="font-weight: 600;">${fmtMoney(p.revenue, cur)}</td>
                    <td class="num">${avgPrice > 0 ? fmtMoney(avgPrice, cur) : '—'}</td>
                    <td class="num" style="background: rgba(15, 110, 86, 0.04); color: var(--green-dark); font-weight: 700;">${netPerPiece > 0 ? fmtMoney(netPerPiece, cur) : '—'}</td>
                    <td class="num">${fmtPercent(p.spp_pct || 0)}</td>
                    <td class="num">${fmt(p.cancellations || 0)}</td>
                    <td class="num">${fmtPercent(buyoutPct)}</td>
                    <td class="num">${fmtMoney(cashback, cur)}</td>
                    <td class="num num-negative">${fmtMoney(p.commission, cur)}</td>
                    <td class="num num-negative">${fmtMoney(p.logistics, cur)}</td>
                    <td class="num num-negative">${fmtMoney(p.storage, cur)}</td>
                    <td class="num num-negative">${fmtMoney(p.promotion || 0, cur)}</td>
                    <td class="num num-negative">${fmtMoney(p.fines || 0, cur)}</td>
                    <td class="num num-negative">${fmtMoney(p.cost, cur)}</td>
                    <td class="num num-negative">${fmtMoney(p.tax, cur)}</td>
                    <td class="num ${p.profit >= 0 ? 'num-positive' : 'num-negative'}" style="font-weight: 700;">${fmtMoney(p.profit, cur)}</td>
                    <td class="num">
                      <div style="font-weight: 800; font-size: 13px; color: ${p.profit >= 0 ? 'var(--green-dark)' : 'var(--red-dark)'}; line-height: 1.1;">${marjaPerPiece !== 0 ? fmtMoney(Math.round(marjaPerPiece), cur) : '—'}</div>
                      <div style="font-size: 10px; color: ${marjaPctColor}; font-weight: 600; margin-top: 2px;">${fmtPercent(p.margin_pct)}</div>
                    </td>
                    <td class="num">${fmtPercent(p.roi_pct)}</td>
                  </tr>
                `}).join('')}
              </tbody>
              <tfoot style="position: sticky; bottom: 0; background: var(--gray-100); font-weight: 700;">
                <tr>
                  <td colspan="4">JAMI (${filtered.length} ta ${groupMode ? 'guruh' : 'tovar'})</td>
                  <td class="num">${fmt(filtered.reduce((s,p) => s + (p.buyouts_qty || 0), 0))}</td>
                  <td class="num">${fmtMoney(filtered.reduce((s,p) => s + p.revenue + (p.returns_rub || 0), 0), cur)}</td>
                  <td class="num">${fmt(filtered.reduce((s,p) => s + p.returns_qty, 0))}</td>
                  <td class="num">${fmtMoney(filtered.reduce((s,p) => s + (p.returns_rub || 0), 0), cur)}</td>
                  <td class="num">${fmt(filtered.reduce((s,p) => s + p.qty, 0))}</td>
                  <td class="num num-positive">${fmtMoney(filtered.reduce((s,p) => s + p.revenue, 0), cur)}</td>
                  <td class="num">—</td>
                  <td class="num">—</td>
                  <td class="num">—</td>
                  <td class="num">—</td>
                  <td class="num">—</td>
                  <td class="num">—</td>
                  <td class="num num-negative">${fmtMoney(filtered.reduce((s,p) => s + p.commission, 0), cur)}</td>
                  <td class="num num-negative">${fmtMoney(filtered.reduce((s,p) => s + p.logistics, 0), cur)}</td>
                  <td class="num num-negative">${fmtMoney(filtered.reduce((s,p) => s + p.storage, 0), cur)}</td>
                  <td class="num num-negative">${fmtMoney(filtered.reduce((s,p) => s + (p.promotion || 0), 0), cur)}</td>
                  <td class="num num-negative">${fmtMoney(filtered.reduce((s,p) => s + (p.fines || 0), 0), cur)}</td>
                  <td class="num num-negative">${fmtMoney(filtered.reduce((s,p) => s + p.cost, 0), cur)}</td>
                  <td class="num num-negative">${fmtMoney(filtered.reduce((s,p) => s + p.tax, 0), cur)}</td>
                  <td class="num" style="font-weight: 700;">${fmtMoney(filtered.reduce((s,p) => s + p.profit, 0), cur)}</td>
                  <td class="num">—</td>
                  <td class="num">—</td>
                </tr>
              </tfoot>
            </table>
      `;
    }


    window.exportCsv = function() {
      const headers = ['Brend', 'Artikul', 'Tovar', 'Sotilgan', 'Qaytarish', 'Daromad',
                       'Komissiya', 'Logistika', 'Saqlash', 'Tannarx', 'Soliq', 'Foyda', 'Marja %', 'ROI %'];
      const rows = products.map(p => [p.brand, p.article, p.product, p.qty, p.returns_qty,
                                       p.revenue, p.commission, p.logistics, p.storage,
                                       p.cost, p.tax, p.profit, p.margin_pct.toFixed(2), p.roi_pct.toFixed(2)]);
      const csv = [headers, ...rows].map(r => r.map(c => {
        const s = String(c || '');
        return s.includes(';') ? `"${s.replace(/"/g, '""')}"` : s;
      }).join(';')).join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `aira-tovarlar-${new Date().toISOString().substring(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      notify('CSV eksport tayyor', 'success');
    };

    renderInner();
  }
  };

  }
</script>

</body>
</html>
