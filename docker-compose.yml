services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-aira}
      POSTGRES_USER: ${DB_USER:-aira}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aira} -d ${DB_NAME:-aira}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not published to the host — only the app talks to the DB over the internal network.
    expose:
      - "5432"

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Inside the compose network the DB is reachable by service name.
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - staticfiles:/app/staticfiles
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/login/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
      # TLS certificates (issued by certbot) and the ACME challenge webroot.
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    # Reload every 12h so renewed certificates are picked up without downtime.
    command: >
      sh -c "while :; do sleep 12h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  # Issues and renews Let's Encrypt certificates via the HTTP-01 challenge,
  # writing them into the shared ./certbot/conf volume that nginx reads.
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # certbot only actually renews when a cert is within 30 days of expiry.
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  pgdata:
  staticfiles:
