<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRA — Хранение</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .week-bar { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid var(--border-light); }
  .week-bar:hover { background: var(--gray-50); }
  .week-bar-label { min-width: 100px; font-size: 12px; color: var(--text-secondary); }
  .week-bar-track { flex: 1; height: 16px; background: var(--gray-100); border-radius: 8px; overflow: hidden; }
  .week-bar-fill { height: 100%; background: linear-gradient(90deg, #185FA5, #6F4FD8); border-radius: 8px; transition: width 0.4s; }
  .week-bar-value { min-width: 110px; text-align: right; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }

  .product-bar { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px dashed var(--border-light); font-size: 12px; }
  .product-bar-rank { min-width: 30px; color: var(--text-tertiary); font-weight: 700; }
  .product-bar-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .product-bar-name strong { color: var(--navy); }
  .product-bar-track { width: 120px; height: 8px; background: var(--gray-100); border-radius: 4px; overflow: hidden; flex-shrink: 0; }
  .product-bar-fill { height: 100%; background: var(--purple); }
  .product-bar-value { min-width: 90px; text-align: right; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; flex-shrink: 0; }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="page">
      <div id="content"></div>
    </main>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/app-init.js"></script>
<script src="js/main.js"></script>
<script src="js/baza-formulas.js"></script>
<script src="js/calculator.js"></script>

<script>
  window.initPage = function() {
    setupLayout('storage');
    const content = document.getElementById('content');
    const base = Storage.getBase();
    const settings = Storage.getSettings();
    const cur = settings.currency;

    if (base.length === 0) {
      renderEmpty(content, {
        icon: '📦',
        title: 'Saqlash ma\'lumoti yo\'q',
        message: 'Avval Подробный отчёt yuklang — saqlash xarajatlari avtomat hisoblanadi',
        link: 'upload.html',
        linkText: '📤 Yuklash'
      });
      return;
    }

    (async function() {
      const baseLen = base.length;
      if (baseLen > 10000) {
        Calculator.showProgress();
      }

      let calculated;
      try {
        calculated = await Calculator.getCalculated((c, t, p) => Calculator.updateProgress(c, t, p));
      } finally {
        Calculator.hideProgress();
      }

      // Saqlash qatorlari (AD > 0 yoki storage_fee > 0)
      const storageRows = calculated.filter(r => (r.AD || 0) > 0 || (r.storage_fee || 0) > 0);

      // Jami saqlash
      const totalStorage = calculated.reduce((s, r) => s + (r.AD || 0), 0);

      // Hafta bo'yicha
      const weekMap = {};
      for (const r of calculated) {
        if ((r.AD || 0) === 0) continue;
        const week = r.AP || r.sale_date || '—';
        if (!weekMap[week]) weekMap[week] = { week, total: 0, count: 0 };
        weekMap[week].total += r.AD || 0;
        weekMap[week].count++;
      }
      const weeks = Object.values(weekMap).sort((a, b) => a.week.localeCompare(b.week));
      const maxWeekTotal = Math.max(...weeks.map(w => w.total), 1);

      // Tovar bo'yicha
      const productMap = {};
      for (const r of calculated) {
        if ((r.AD || 0) === 0) continue;
        const article = r.AT || r.article || 'Noma\'lum';
        if (!productMap[article]) {
          productMap[article] = {
            article,
            product: r.AU || r.product_name || '',
            brand: r.AS || r.brand || '',
            total: 0,
            count: 0
          };
        }
        productMap[article].total += r.AD || 0;
        productMap[article].count++;
      }
      const products = Object.values(productMap).sort((a, b) => b.total - a.total);
      const maxProductTotal = products[0]?.total || 1;

      // Sklad bo'yicha
      const warehouseMap = {};
      for (const r of calculated) {
        if ((r.AD || 0) === 0) continue;
        const wh = r.warehouse || '—';
        if (!warehouseMap[wh]) {
          warehouseMap[wh] = {
            warehouse: wh,
            total: 0,
            count: 0,
            products: {}
          };
        }
        warehouseMap[wh].total += r.AD || 0;
        warehouseMap[wh].count++;

        // Sklad ichida tovarlar
        const art = r.AT || r.article || 'Noma\'lum';
        if (!warehouseMap[wh].products[art]) {
          warehouseMap[wh].products[art] = { article: art, product: r.AU || r.product_name || '', total: 0, count: 0 };
        }
        warehouseMap[wh].products[art].total += r.AD || 0;
        warehouseMap[wh].products[art].count++;
      }
      const warehouses = Object.values(warehouseMap)
        .map(w => ({
          ...w,
          products: Object.values(w.products).sort((a, b) => b.total - a.total)
        }))
        .sort((a, b) => b.total - a.total);
      const maxWhTotal = warehouses[0]?.total || 1;

      // Achot bo'yicha (Список otchetov'dan keladi - storage_cost)
      const reportMap = {};
      for (const r of calculated) {
        if ((r.AD || 0) === 0) continue;
        const rn = r.report_num || 'Noma\'lum';
        if (!reportMap[rn]) reportMap[rn] = { report_num: rn, total: 0, count: 0 };
        reportMap[rn].total += r.AD || 0;
        reportMap[rn].count++;
      }
      const reports = Object.values(reportMap).sort((a, b) => b.total - a.total);

      // Average per row
      const avgPerRow = storageRows.length > 0 ? totalStorage / storageRows.length : 0;
      const avgPerWeek = weeks.length > 0 ? totalStorage / weeks.length : 0;

      content.innerHTML = `
        <div class="page-header">
          <h1 class="page-title">📦 Хранение (Saqlash)</h1>
          <p class="page-subtitle">WB omborida saqlash xarajatlari batafsil</p>
        </div>

        <!-- KPI -->
        <div class="stat-grid">
          <div class="kpi-card">
            <div class="kpi-label">💰 Jami saqlash</div>
            <div class="kpi-value">${fmtMoneyShort(totalStorage, cur)}</div>
            <div class="kpi-change">${fmt(storageRows.length)} ta qatorda</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">🏬 Skladlar</div>
            <div class="kpi-value">${warehouses.length}</div>
            <div class="kpi-change">turli xil</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">📅 Haftalar</div>
            <div class="kpi-value">${weeks.length}</div>
            <div class="kpi-change">o'rt. ${fmtMoney(avgPerWeek, cur)}/hafta</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">📦 Tovarlar</div>
            <div class="kpi-value">${products.length}</div>
            <div class="kpi-change">saqlash bilan</div>
          </div>
        </div>

        <!-- Hafta bo'yicha -->
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">📅 Hafta bo'yicha saqlash</div>
              <div class="card-subtitle">Qaysi haftada qancha to'lagansiz</div>
            </div>
          </div>
          ${weeks.length === 0 ? '<div style="padding: 20px; text-align: center; color: var(--text-tertiary);">Saqlash qatorlari topilmadi</div>' : weeks.map(w => `
            <div class="week-bar">
              <div class="week-bar-label">📅 ${fmtDate(w.week)}</div>
              <div class="week-bar-track">
                <div class="week-bar-fill" style="width: ${(w.total / maxWeekTotal * 100).toFixed(1)}%;"></div>
              </div>
              <div class="week-bar-value">${fmtMoney(w.total, cur)}</div>
            </div>
          `).join('')}
          ${weeks.length > 0 ? `
            <div style="margin-top: 10px; padding: 10px; background: var(--gray-50); border-radius: 6px; font-size: 12px; color: var(--text-secondary); text-align: center;">
              <strong style="color: var(--text);">JAMI:</strong> ${fmtMoney(totalStorage, cur)} ·
              <strong style="color: var(--text);">O'RTACHA:</strong> ${fmtMoney(avgPerWeek, cur)}/hafta
            </div>
          ` : ''}
        </div>

        <!-- Склад bo'yicha -->
        ${warehouses.length > 0 ? `
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">🏬 Sklad bo'yicha taqsimot</div>
                <div class="card-subtitle">Qaysi sklad'da qaysi tovarlar ko'p saqlanmoqda</div>
              </div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 12px;">
              ${warehouses.map((w, i) => `
                <div style="border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: white;">
                  <div style="padding: 12px 14px; background: linear-gradient(135deg, #185FA5, #0F6E56); color: white;">
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                      <div>
                        <div style="font-size: 14px; font-weight: 700;">🏬 ${w.warehouse}</div>
                        <div style="font-size: 10px; opacity: 0.85; margin-top: 2px;">${w.count} qator · ${w.products.length} tovar</div>
                      </div>
                      <div style="text-align: right;">
                        <div style="font-size: 16px; font-weight: 700;">${fmtMoney(w.total, cur)}</div>
                        <div style="font-size: 10px; opacity: 0.85;">${(w.total / totalStorage * 100).toFixed(1)}% jamidan</div>
                      </div>
                    </div>
                  </div>
                  <div style="padding: 10px 14px;">
                    <div style="font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px;">Top 5 tovar shu sklad'da:</div>
                    ${w.products.slice(0, 5).map((p, j) => `
                      <div style="display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px dashed var(--border-light); font-size: 11px;">
                        <span style="color: var(--text-tertiary); font-weight: 700; min-width: 18px;">#${j + 1}</span>
                        <div style="flex: 1; min-width: 0;">
                          <strong style="color: var(--navy);">${p.article}</strong>
                          ${p.product ? `<div style="color: var(--text-tertiary); font-size: 10px;">${p.product.substring(0, 30)}${p.product.length > 30 ? '…' : ''}</div>` : ''}
                        </div>
                        <div style="text-align: right; font-weight: 600; color: var(--text); min-width: 80px;">${fmtMoney(p.total, cur)}</div>
                      </div>
                    `).join('')}
                    ${w.products.length > 5 ? `
                      <div style="padding: 6px 0 0; font-size: 10px; color: var(--text-tertiary); text-align: center;">
                        ... va yana ${w.products.length - 5} ta tovar
                      </div>
                    ` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}

        <!-- 2 ta yonma-yon -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 14px;">

          <!-- Tovar bo'yicha -->
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">📦 Tovarlar bo'yicha</div>
                <div class="card-subtitle">Qaysi tovar ko'p saqlanmoqda (Top 20)</div>
              </div>
            </div>
            ${products.slice(0, 20).map((p, i) => `
              <div class="product-bar">
                <div class="product-bar-rank">#${i + 1}</div>
                <div class="product-bar-name">
                  <strong>${p.article}</strong>
                  ${p.product ? `<span style="color: var(--text-tertiary); font-size: 10px; margin-left: 4px;">${p.product.substring(0, 25)}${p.product.length > 25 ? '…' : ''}</span>` : ''}
                </div>
                <div class="product-bar-track">
                  <div class="product-bar-fill" style="width: ${(p.total / maxProductTotal * 100).toFixed(1)}%;"></div>
                </div>
                <div class="product-bar-value">${fmtMoney(p.total, cur)}</div>
              </div>
            `).join('')}
            ${products.length > 20 ? `
              <div style="margin-top: 8px; padding: 8px; text-align: center; color: var(--text-tertiary); font-size: 11px;">
                ... va yana ${products.length - 20} ta tovar
              </div>
            ` : ''}
          </div>

          <!-- Achot bo'yicha -->
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">📋 Achot bo'yicha</div>
                <div class="card-subtitle">Har achot uchun saqlash summasi</div>
              </div>
            </div>
            ${reports.map(r => {
              const lr = Storage.getReport(r.report_num);
              return `
                <div class="product-bar">
                  <div class="product-bar-name">
                    <strong>№ ${r.report_num}</strong>
                    ${lr ? `<span style="color: var(--text-tertiary); font-size: 10px; margin-left: 4px;">${fmtDate(lr.date_from)} – ${fmtDate(lr.date_to)}</span>` : ''}
                  </div>
                  <div class="product-bar-value">${fmtMoney(r.total, cur)}</div>
                </div>
              `;
            }).join('')}
          </div>
        </div>

        <!-- Jadval (batafsil) -->
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">📋 Saqlash qatorlari (batafsil)</div>
              <div class="card-subtitle">${fmt(storageRows.length)} ta qator</div>
            </div>
            <button class="btn btn-outline" onclick="exportStorageCsv()" style="font-size: 11px;">📥 CSV</button>
          </div>
          <div class="table-wrapper" style="border: none; max-height: 500px; overflow-y: auto;">
            <table class="table" style="font-size: 11px;">
              <thead style="position: sticky; top: 0; background: var(--gray-100); z-index: 5;">
                <tr>
                  <th>Sana</th>
                  <th>№ Achot</th>
                  <th>🏬 Sklad</th>
                  <th>Brand</th>
                  <th>Artikul</th>
                  <th>Tovar</th>
                  <th class="num">Saqlash</th>
                </tr>
              </thead>
              <tbody>
                ${storageRows.slice(0, 500).map(r => {
                  // Saqlash qatorlari odatda tovar bilan bog'liq emas (Хранение operatsiyalari)
                  // Lekin AT/article bo'lsa ko'rsatamiz
                  const hasProduct = r.AT || r.article;
                  return `
                  <tr>
                    <td>${fmtDate(r.sale_date) || '—'}</td>
                    <td><strong style="color: var(--blue);">${r.report_num || '—'}</strong></td>
                    <td style="font-size: 11px;">${r.warehouse || '—'}</td>
                    <td>${hasProduct ? (r.AS || r.brand || '—') : '<span style="color: var(--text-tertiary);">Удержания WB</span>'}</td>
                    <td>${hasProduct ? `<strong>${r.AT || r.article}</strong>` : '<span style="color: var(--text-tertiary);">—</span>'}</td>
                    <td style="max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${r.AU || r.product_name || ''}">${hasProduct ? (r.AU || r.product_name || '').substring(0, 40) : '<span style="color: var(--text-tertiary);">Umumiy saqlash xarajati</span>'}</td>
                    <td class="num num-negative" style="font-weight: 600;">${fmtMoney(r.AD || 0, cur)}</td>
                  </tr>
                `}).join('')}
              </tbody>
              ${storageRows.length > 500 ? `
                <tfoot>
                  <tr><td colspan="7" style="text-align: center; padding: 12px; color: var(--text-tertiary); font-size: 11px;">... va yana ${fmt(storageRows.length - 500)} ta qator. Hammasini CSV orqali yuklab oling</td></tr>
                </tfoot>
              ` : ''}
            </table>
          </div>
        </div>
      `;

      window.exportStorageCsv = function() {
        const header = ['Sana', 'Achot', 'Brand', 'Artikul', 'Tovar', 'Razmer', 'Sotuvlar', 'Saqlash'];
        const rows = storageRows.map(r => [
          r.sale_date || '',
          r.report_num || '',
          r.AS || r.brand || '',
          r.AT || r.article || '',
          (r.AU || r.product_name || '').replace(/[;\n]/g, ' '),
          r.AV || r.size || '',
          (r.D || 0) - (r.E || 0),
          (r.AD || 0).toFixed(2)
        ]);
        const csv = [header, ...rows].map(r => r.join(';')).join('\n');
        const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `aira-storage-${new Date().toISOString().substring(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        notify('CSV eksport tayyor', 'success');
      };
    })();
  };
</script>

</body>
</html>
