<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRA — Sozlamalar</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .settings-section { background: white; border-radius: 10px; padding: 18px; margin-bottom: 16px;
                      border: 1px solid var(--border-light); }
  .settings-section h3 { font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 12px;
                          padding-bottom: 10px; border-bottom: 1px solid var(--border-light); }
  .field-row { display: grid; grid-template-columns: 180px 1fr; gap: 12px; margin-bottom: 12px;
               align-items: center; }
  .field-row label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .tax-card { padding: 12px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer;
              transition: all 0.2s; }
  .tax-card:hover { border-color: var(--blue); }
  .tax-card.selected { border-color: var(--blue); background: var(--blue-bg); }
  .tax-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="page">

      <div class="page-header">
        <h1 class="page-title">Sozlamalar</h1>
        <p class="page-subtitle">Profil, soliq turi va sayt sozlamalari</p>
      </div>

      <div id="content"></div>

    </main>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/app-init.js"></script>
<script src="js/main.js"></script>

<script>
  window.initPage = function() {
setupLayout('settings');

  const settings = Storage.getSettings();
  const content = document.getElementById('content');
  const currentLang = (typeof Storage.getLang === 'function') ? Storage.getLang() : 'uz';

  function render() {
    content.innerHTML = `
      <!-- Profil -->
      <div class="settings-section">
        <h3>👤 Profil</h3>
        <div class="field-row">
          <label>IP nomi:</label>
          <input type="text" class="form-input" id="ipName" value="${settings.ip_name || ''}" placeholder="ИП Олимова Сарвинохон О К">
        </div>
        <div class="field-row">
          <label>Brend:</label>
          <input type="text" class="form-input" id="brand" value="${settings.brand || ''}" placeholder="Piccino">
        </div>
        <div class="field-row">
          <label>Mamlakat:</label>
          <select class="form-input" id="country">
            <option value="🇷🇺 RU" ${settings.country === '🇷🇺 RU' ? 'selected' : ''}>🇷🇺 Rossiya (RU)</option>
            <option value="🇰🇬 KG" ${settings.country === '🇰🇬 KG' ? 'selected' : ''}>🇰🇬 Qirg'iziston (KG)</option>
            <option value="🇰🇿 KZ" ${settings.country === '🇰🇿 KZ' ? 'selected' : ''}>🇰🇿 Qozog'iston (KZ)</option>
            <option value="🇺🇿 UZ" ${settings.country === '🇺🇿 UZ' ? 'selected' : ''}>🇺🇿 O'zbekiston (UZ)</option>
            <option value="🇧🇾 BY" ${settings.country === '🇧🇾 BY' ? 'selected' : ''}>🇧🇾 Belarus (BY)</option>
          </select>
        </div>
        <div class="field-row">
          <label>Valyuta:</label>
          <select class="form-input" id="currency">
            <option value="₽" ${settings.currency === '₽' ? 'selected' : ''}>₽ (rubl)</option>
            <option value="KGS" ${settings.currency === 'KGS' ? 'selected' : ''}>KGS (som)</option>
            <option value="UZS" ${settings.currency === 'UZS' ? 'selected' : ''}>UZS (sum)</option>
            <option value="USD" ${settings.currency === 'USD' ? 'selected' : ''}>USD ($)</option>
          </select>
        </div>
        <div class="field-row">
          <label>INN:</label>
          <input type="text" class="form-input" id="inn" value="${settings.inn || ''}" placeholder="INN raqami (ixtiyoriy)">
        </div>
      </div>

      <!-- Soliq -->
      <div class="settings-section">
        <h3>💰 Soliq</h3>

        <div class="tip-box info" style="margin-bottom: 14px;">
          <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M11.25 11.25l.041-.02a.75.75 0 011.063.852" stroke-linecap="round"/></svg>
          <div class="tip-content">
            <strong>Sizning Excel'ingizdan:</strong> Dashboard!S25 = "${getTaxName(settings.tax_type)}", S27 = ${settings.tax_rate}%
            <br><strong>Eslatma:</strong> Rossiya IP — daromadan to'laydi. Qirg'iziston IP — hisobraqamga tushgan puldan.
          </div>
        </div>

        <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 10px;">
          <strong>Soliq turi tanlang:</strong>
        </p>

        <div class="tax-grid">
          <div class="tax-card ${settings.tax_type === 1 ? 'selected' : ''}" onclick="selectTaxType(1)">
            <div style="font-weight: 600; color: var(--navy); margin-bottom: 4px;">
              1️⃣ УСН-доходы (RU)
            </div>
            <div style="font-size: 11px; color: var(--text-secondary);">
              Soliq <strong>Sotuv summasidan</strong> (WB реализовал)
              <br>RU IP uchun
            </div>
          </div>

          <div class="tax-card ${settings.tax_type === 2 ? 'selected' : ''}" onclick="selectTaxType(2)">
            <div style="font-weight: 600; color: var(--navy); margin-bottom: 4px;">
              2️⃣ УСН Д-Р (RU)
            </div>
            <div style="font-size: 11px; color: var(--text-secondary);">
              Soliq <strong>(Oplata - Tannarx - Xarajat)</strong> dan
              <br>RU IP uchun
            </div>
          </div>

          <div class="tax-card ${settings.tax_type === 3 ? 'selected' : ''}" onclick="selectTaxType(3)">
            <div style="font-weight: 600; color: var(--navy); margin-bottom: 4px;">
              3️⃣ Не считать налог
            </div>
            <div style="font-size: 11px; color: var(--text-secondary);">
              Soliq <strong>hisoblamaslik</strong>
            </div>
          </div>

          <div class="tax-card ${settings.tax_type === 4 ? 'selected' : ''}" onclick="selectTaxType(4)">
            <div style="font-weight: 600; color: var(--navy); margin-bottom: 4px;">
              4️⃣ Считать от РС (KG)
            </div>
            <div style="font-size: 11px; color: var(--text-secondary);">
              Soliq <strong>Hisobraqamga tushgan puldan</strong>
              <br>KG IP uchun
            </div>
          </div>
        </div>

        <div class="field-row" style="margin-top: 16px;">
          <label>Soliq foizi:</label>
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="number" class="form-input" id="taxRate" value="${settings.tax_rate || 0}" step="0.1" min="0" max="50" style="max-width: 100px;">
            <span style="font-weight: 600;">%</span>
            <span style="font-size: 11px; color: var(--text-tertiary);">(masalan: 2, 6, 15)</span>
          </div>
        </div>
      </div>

      <!-- Til -->
      <div class="settings-section">
        <h3>🌍 Til</h3>
        <div class="field-row">
          <label>Interfeys tili:</label>
          <select class="form-input" id="langSelect">
            <option value="uz" ${currentLang === 'uz' ? 'selected' : ''}>🇺🇿 O'zbek</option>
            <option value="ru" ${currentLang === 'ru' ? 'selected' : ''}>🇷🇺 Rus</option>
          </select>
        </div>
      </div>

      <!-- Backup -->
      <div class="settings-section">
        <h3>💾 Ma'lumotlar boshqaruvi</h3>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <button class="btn btn-primary" onclick="exportAll()" style="padding: 12px; font-size: 13px;">
            📥 Backup eksport (JSON)
          </button>
          <button class="btn btn-outline" onclick="document.getElementById('importFile').click()" style="padding: 12px; font-size: 13px;">
            📤 Backup import
          </button>
          <input type="file" id="importFile" accept=".json" style="display: none;">

          <button class="btn btn-outline" onclick="clearCacheNow()" style="padding: 12px; font-size: 13px; color: var(--blue);">
            🔄 Cache tozalash (qayta hisoblash)
          </button>
          <button class="btn btn-outline" onclick="clearBase()" style="padding: 12px; font-size: 13px; color: var(--red);">
            🗑 База tozalash
          </button>
          <button class="btn btn-outline" onclick="clearAll()" style="padding: 12px; font-size: 13px; color: var(--red); background: var(--red-light); grid-column: 1 / -1;">
            ⚠ HAMMASINI tozalash
          </button>
        </div>

        <div style="margin-top: 14px; font-size: 11px; color: var(--text-tertiary);">
          <strong>Hozir saqlangan:</strong>
          ${Storage.getListReports().length} ta achot ·
          ${fmt(Storage.getBase().length)} qator База ·
          ${Storage.getCosts().length} ta tovar tannarx
        </div>
      </div>

      <div style="position: sticky; bottom: 0; background: var(--bg); padding: 16px 0; margin: 16px -24px -20px; padding-left: 24px; padding-right: 24px; border-top: 1px solid var(--border);">
        <button class="btn btn-primary" onclick="saveAll()" style="padding: 12px 32px; font-size: 14px;">
          💾 Sozlamalarni saqlash
        </button>
      </div>
    `;

    // Tax type cards
    window.selectTaxType = function(type) {
      settings.tax_type = type;
      settings.tax_type_name = getTaxName(type);
      render();
    };

    // Import handler — har render'dan keyin qayta bog'lanadi
    bindImportHandler();
  }

  function getTaxName(type) {
    const names = { 1: 'УСН-доходы', 2: 'УСН Д-Р', 3: 'Не считать налог', 4: 'Считать от РС' };
    return names[type] || 'УСН-доходы';
  }

  window.saveAll = function() {
    const newSettings = {
      ...settings,
      ip_name: document.getElementById('ipName').value.trim(),
      brand: document.getElementById('brand').value.trim(),
      country: document.getElementById('country').value,
      currency: document.getElementById('currency').value,
      inn: document.getElementById('inn').value.trim(),
      tax_rate: parseFloat(document.getElementById('taxRate').value) || 0
    };
    Storage.setSettings(newSettings);
    setLanguage(document.getElementById('langSelect').value);
    notify('✓ Sozlamalar saqlandi', 'success');
    setTimeout(() => window.location.reload(), 800);
  };

  window.exportAll = function() {
    const data = Storage.exportAll();
    data._exported_at = new Date().toISOString();
    data._app = 'AIRA';
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `aira-backup-${new Date().toISOString().substring(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    notify('Backup yuklab olindi', 'success');
  };

  // Backup import handler — render()'dan keyin bog'lanadi (element shunda paydo bo'ladi)
  function bindImportHandler() {
    const importFile = document.getElementById('importFile');
    if (!importFile) return;
    importFile.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (!confirm('Backup import qilinadi. Hozirgi ma\'lumotlar BERAK BO\'LADI. Davom etasizmi?')) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        Storage.importAll(data);
        notify('Backup import qilindi', 'success');
        setTimeout(() => window.location.reload(), 800);
      } catch (err) {
        alert('Import xatosi: ' + err.message);
      }
    });
  }

  window.clearCacheNow = function() {
    if (confirm('Hisoblangan natija cache tozalanadi. Keyingi sahifa ochilganda qayta hisoblanadi.\n\nDavom etasizmi?')) {
      if (typeof Calculator !== 'undefined') {
        Calculator.invalidate();
      } else {
        Storage.remove(Storage.KEYS.BASE_CALCULATED);
        Storage.remove(Storage.KEYS.KPI_CACHE);
        Storage.remove(Storage.KEYS.CALC_VERSION);
      }
      notify('Cache tozalandi - keyingi sahifa qayta hisoblanadi', 'success');
    }
  };

  window.clearBase = function() {
    if (confirm('База va Список отчётов tozalanadi. Tannarx saqlanib qoladi. Davom etasizmi?')) {
      Storage.clearBase();
      Storage.clearListReports();
      // Cache ham
      Storage.remove(Storage.KEYS.BASE_CALCULATED);
      Storage.remove(Storage.KEYS.KPI_CACHE);
      Storage.remove(Storage.KEYS.CALC_VERSION);
      notify('База tozalandi', 'warning');
      setTimeout(() => window.location.reload(), 800);
    }
  };

  window.clearAll = function() {
    if (confirm('HAMMA MA\'LUMOTLAR o\'chiriladi (Список, База, Tannarx, Sozlamalar). Davom etasizmi?')) {
      if (confirm('ROSTAKAMMI? Bu amalni qaytarib bo\'lmaydi!')) {
        Storage.clearAll();
        notify('Hammasi o\'chirildi', 'warning');
        setTimeout(() => window.location.href = 'index.html', 800);
      }
    }
  };

  render();
  };
</script>

</body>
</html>
