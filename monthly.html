<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRA — Отчёт по месяцам</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .month-header { background: linear-gradient(135deg, #185FA5, #042C53);
                   color: white; padding: 20px 24px; border-radius: 12px; margin-bottom: 16px; }
  .month-header h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px 0; }
  .month-header .subtitle { font-size: 13px; opacity: 0.9; }

  .month-card { background: white; border-radius: 12px; padding: 16px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--border-light);
                transition: all 0.2s; cursor: pointer; }
  .month-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .month-card-header { display: flex; align-items: center; justify-content: space-between;
                        margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border-light); }
  .month-card-title { font-size: 16px; font-weight: 700; color: var(--navy); }
  .month-card-badge { font-size: 10px; padding: 3px 8px; border-radius: 10px;
                       background: var(--blue-bg); color: var(--blue); font-weight: 600; }

  .month-metric { display: flex; align-items: center; justify-content: space-between;
                   padding: 8px 0; border-bottom: 1px dashed var(--border-light); font-size: 12.5px; }
  .month-metric:last-child { border-bottom: none; }
  .month-metric-label { color: var(--text-secondary); font-size: 11px; }
  .month-metric-value { font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); }

  .profit-positive { color: var(--green-dark); }
  .profit-negative { color: var(--red-dark); }

  .month-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .month-table th { background: var(--gray-100); padding: 10px 8px; text-align: left;
                     font-size: 11px; color: var(--text-secondary); font-weight: 600;
                     text-transform: uppercase; letter-spacing: 0.3px;
                     border-bottom: 1px solid var(--border); }
  .month-table th.num { text-align: right; }
  .month-table td { padding: 12px 8px; border-bottom: 1px solid var(--border-light); }
  .month-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .month-table tbody tr:hover { background: var(--gray-50); }

  .compare-up { color: var(--green-dark); }
  .compare-down { color: var(--red-dark); }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <main class="page">
      <div id="content"></div>
    </main>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/app-init.js"></script>
<script src="js/main.js"></script>
<script src="js/baza-formulas.js"></script>
<script src="js/calculator.js"></script>

<script>
  window.initPage = function() {
    setupLayout('monthly');
    const content = document.getElementById('content');
    const base = Storage.getBase();
    const settings = Storage.getSettings();
    const cur = settings.currency;

    if (base.length === 0) {
      renderEmpty(content, {
        icon: '📅',
        title: 'Otchot bo\'sh',
        message: 'Avval Подробный отчёt yuklang',
        link: 'upload.html',
        linkText: '📤 Yuklash'
      });
      return;
    }

    (async function() {
      const baseLen = base.length;
      const showProgress = baseLen > 10000;
      let calculated;
      if (showProgress) {
        Calculator.showProgress();
        try {
          calculated = await Calculator.getCalculated((c, t, p) => Calculator.updateProgress(c, t, p));
        } finally { Calculator.hideProgress(); }
      } else {
        calculated = await Calculator.getCalculated();
      }

      const ctx = {
        costs: Storage.getCosts(), settings,
        samovikupy: Storage.getSelfPurchases(),
        extExpenses: Storage.getExtExpenses(),
        listReports: Storage.getListReports()
      };

      // Oylar bo'yicha jamlash
      const monthsMap = {};
      for (const r of calculated) {
        const date = r.sale_date || r.AP || '';
        if (!date) continue;
        const ymKey = date.substring(0, 7);  // YYYY-MM
        if (!monthsMap[ymKey]) {
          monthsMap[ymKey] = [];
        }
        monthsMap[ymKey].push(r);
      }

      // Har oy uchun KPI
      const months = Object.keys(monthsMap).sort().reverse().map(ymKey => {
        const rows = monthsMap[ymKey];
        const kpi = BazaFormulas.calculateKPI(rows, ctx);
        const products = BazaFormulas.byProduct(rows);

        // Top tovar
        const topProduct = products[0];

        return {
          ymKey,
          rows,
          kpi,
          productCount: products.length,
          topProduct
        };
      });

      // Eng yaxshi oy
      const bestMonth = months.reduce((best, m) =>
        (!best || m.kpi.net_profit > best.kpi.net_profit) ? m : best, null);

      // O'rtacha
      const totalProfit = months.reduce((s, m) => s + m.kpi.net_profit, 0);
      const totalRevenue = months.reduce((s, m) => s + m.kpi.revenue, 0);
      const avgProfit = months.length > 0 ? totalProfit / months.length : 0;

      const monthNames = {
        '01': 'Yanvar', '02': 'Fevral', '03': 'Mart',
        '04': 'Aprel', '05': 'May', '06': 'Iyun',
        '07': 'Iyul', '08': 'Avgust', '09': 'Sentabr',
        '10': 'Oktabr', '11': 'Noyabr', '12': 'Dekabr'
      };

      function fmtMonth(ymKey) {
        const [y, m] = ymKey.split('-');
        return `${monthNames[m] || m} ${y}`;
      }

      // Solishtirish
      function compareIcon(curr, prev) {
        if (prev === 0 || prev === undefined) return '';
        const diff = ((curr - prev) / Math.abs(prev) * 100);
        if (Math.abs(diff) < 0.1) return '';
        const sign = diff > 0 ? '↗' : '↘';
        const cls = diff > 0 ? 'compare-up' : 'compare-down';
        return `<span class="${cls}" style="font-size: 10px; margin-left: 4px;">${sign} ${Math.abs(diff).toFixed(1)}%</span>`;
      }

      content.innerHTML = `
        <div class="month-header">
          <h1>📅 Отчёт по месяцам</h1>
          <div class="subtitle">
            ${months.length} ta oy · ${fmt(base.length)} qator · jami foyda ${fmtMoneyShort(totalProfit, cur)}
          </div>
        </div>

        <!-- Yakuniy ko'rsatkichlar -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px;">
          <div class="kpi-card">
            <div class="kpi-label">📊 Jami daromad</div>
            <div class="kpi-value">${fmtMoneyShort(totalRevenue, cur)}</div>
            <div class="kpi-change">${months.length} ta oy bo'yicha</div>
          </div>
          <div class="kpi-card ${totalProfit >= 0 ? 'success' : 'danger'}">
            <div class="kpi-label">💰 Jami toza foyda</div>
            <div class="kpi-value">${fmtMoneyShort(totalProfit, cur)}</div>
            <div class="kpi-change">Marja ${totalRevenue > 0 ? fmtPercent(totalProfit / totalRevenue * 100) : '—'}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">📈 O'rtacha foyda/oy</div>
            <div class="kpi-value">${fmtMoneyShort(avgProfit, cur)}</div>
          </div>
          <div class="kpi-card success">
            <div class="kpi-label">🏆 Eng yaxshi oy</div>
            <div class="kpi-value" style="font-size: 16px;">${bestMonth ? fmtMonth(bestMonth.ymKey) : '—'}</div>
            <div class="kpi-change">${bestMonth ? fmtMoneyShort(bestMonth.kpi.net_profit, cur) : ''}</div>
          </div>
        </div>

        <!-- Oylar kartochkalari -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 14px; margin-bottom: 16px;">
          ${months.map((m, i) => {
            const prev = months[i + 1];  // keyingi (oldingi vaqt bo'yicha)
            return `
              <div class="month-card" onclick="filterByMonth('${m.ymKey}')">
                <div class="month-card-header">
                  <div>
                    <div class="month-card-title">${fmtMonth(m.ymKey)}</div>
                    <div style="font-size: 11px; color: var(--text-tertiary); margin-top: 2px;">${fmt(m.rows.length)} qator · ${m.productCount} ta tovar</div>
                  </div>
                  <div class="month-card-badge">${fmt(m.kpi.sales_qty)} sotuv</div>
                </div>

                <div class="month-metric">
                  <div class="month-metric-label">💰 Daromad</div>
                  <div class="month-metric-value">
                    ${fmtMoney(m.kpi.revenue, cur)}
                    ${prev ? compareIcon(m.kpi.revenue, prev.kpi.revenue) : ''}
                  </div>
                </div>
                <div class="month-metric">
                  <div class="month-metric-label">🏦 Опл. РС</div>
                  <div class="month-metric-value">${fmtMoney(m.kpi.to_pay_rs, cur)}</div>
                </div>
                <div class="month-metric">
                  <div class="month-metric-label">💸 WB ushlanmalari</div>
                  <div class="month-metric-value profit-negative">-${fmtMoney(m.kpi.all_wb_deductions, cur)}</div>
                </div>
                <div class="month-metric">
                  <div class="month-metric-label">📦 Tannarx</div>
                  <div class="month-metric-value profit-negative">-${fmtMoney(m.kpi.cost, cur)}</div>
                </div>
                <div class="month-metric">
                  <div class="month-metric-label">📋 Soliq</div>
                  <div class="month-metric-value profit-negative">-${fmtMoney(m.kpi.tax, cur)}</div>
                </div>
                <div class="month-metric" style="background: ${m.kpi.net_profit >= 0 ? 'var(--green-light)' : 'var(--red-light)'}; margin: 6px -4px 0; padding: 10px 12px; border-radius: 8px;">
                  <div class="month-metric-label" style="font-weight: 700; color: var(--text);">${m.kpi.net_profit >= 0 ? '✅' : '⚠️'} Toza foyda</div>
                  <div class="month-metric-value ${m.kpi.net_profit >= 0 ? 'profit-positive' : 'profit-negative'}" style="font-size: 16px;">
                    ${fmtMoney(m.kpi.net_profit, cur)}
                    ${prev ? compareIcon(m.kpi.net_profit, prev.kpi.net_profit) : ''}
                  </div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 8px; font-size: 11px;">
                  <span style="flex: 1; text-align: center; padding: 6px; background: var(--gray-50); border-radius: 4px;">
                    <div style="color: var(--text-tertiary);">Marja</div>
                    <strong style="font-size: 13px; color: var(--navy);">${fmtPercent(m.kpi.margin_pct)}</strong>
                  </span>
                  <span style="flex: 1; text-align: center; padding: 6px; background: var(--gray-50); border-radius: 4px;">
                    <div style="color: var(--text-tertiary);">ROI</div>
                    <strong style="font-size: 13px; color: var(--navy);">${fmtPercent(m.kpi.roi_pct)}</strong>
                  </span>
                  <span style="flex: 1; text-align: center; padding: 6px; background: var(--gray-50); border-radius: 4px;">
                    <div style="color: var(--text-tertiary);">O'rt. chek</div>
                    <strong style="font-size: 13px; color: var(--navy);">${fmtMoneyShort(m.kpi.avg_price, cur)}</strong>
                  </span>
                </div>

                ${m.topProduct ? `
                  <div style="margin-top: 10px; padding: 8px 10px; background: var(--blue-bg); border-radius: 6px; font-size: 11px;">
                    <span style="color: var(--text-tertiary);">🏆 Top tovar:</span>
                    <strong style="color: var(--blue); margin-left: 4px;">${m.topProduct.article}</strong>
                    <span style="color: var(--text-secondary); margin-left: 4px;">· ${fmtMoneyShort(m.topProduct.revenue, cur)}</span>
                  </div>
                ` : ''}
              </div>
            `;
          }).join('')}
        </div>

        <!-- Solishtirish jadvali -->
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">📊 Oylarni solishtirish</div>
              <div class="card-subtitle">Hammasini bir joyda ko'ring</div>
            </div>
            <button class="btn btn-outline" onclick="exportMonthlyCsv()" style="font-size: 11px;">📥 CSV</button>
          </div>
          <div class="table-wrapper" style="border: none;">
            <table class="month-table">
              <thead>
                <tr>
                  <th>Oy</th>
                  <th class="num">Qatorlar</th>
                  <th class="num">Sotilgan</th>
                  <th class="num">Daromad</th>
                  <th class="num">WB ushl.</th>
                  <th class="num">Tannarx</th>
                  <th class="num">Soliq</th>
                  <th class="num">Foyda</th>
                  <th class="num">Marja</th>
                </tr>
              </thead>
              <tbody>
                ${months.map(m => `
                  <tr style="cursor: pointer;" onclick="filterByMonth('${m.ymKey}')">
                    <td><strong>${fmtMonth(m.ymKey)}</strong></td>
                    <td class="num">${fmt(m.rows.length)}</td>
                    <td class="num">${fmt(m.kpi.sales_qty)}</td>
                    <td class="num">${fmtMoney(m.kpi.revenue, cur)}</td>
                    <td class="num profit-negative">${fmtMoney(m.kpi.all_wb_deductions, cur)}</td>
                    <td class="num profit-negative">${fmtMoney(m.kpi.cost, cur)}</td>
                    <td class="num profit-negative">${fmtMoney(m.kpi.tax, cur)}</td>
                    <td class="num ${m.kpi.net_profit >= 0 ? 'profit-positive' : 'profit-negative'}" style="font-weight: 700;">${fmtMoney(m.kpi.net_profit, cur)}</td>
                    <td class="num">${fmtPercent(m.kpi.margin_pct)}</td>
                  </tr>
                `).join('')}
              </tbody>
              <tfoot>
                <tr style="background: var(--gray-100); font-weight: 700;">
                  <td>JAMI (${months.length} oy)</td>
                  <td class="num">${fmt(base.length)}</td>
                  <td class="num">${fmt(months.reduce((s, m) => s + m.kpi.sales_qty, 0))}</td>
                  <td class="num">${fmtMoney(totalRevenue, cur)}</td>
                  <td class="num profit-negative">${fmtMoney(months.reduce((s, m) => s + m.kpi.all_wb_deductions, 0), cur)}</td>
                  <td class="num profit-negative">${fmtMoney(months.reduce((s, m) => s + m.kpi.cost, 0), cur)}</td>
                  <td class="num profit-negative">${fmtMoney(months.reduce((s, m) => s + m.kpi.tax, 0), cur)}</td>
                  <td class="num ${totalProfit >= 0 ? 'profit-positive' : 'profit-negative'}">${fmtMoney(totalProfit, cur)}</td>
                  <td class="num">${totalRevenue > 0 ? fmtPercent(totalProfit / totalRevenue * 100) : '—'}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      `;

      window.filterByMonth = function(ymKey) {
        // Dashboard'ga o'tib filtrlash
        window.location.href = `dashboard.html?month=${ymKey}`;
      };

      window.exportMonthlyCsv = function() {
        const header = ['Oy', 'Qatorlar', 'Sotilgan', 'Daromad', 'WB ushlanmalari', 'Tannarx', 'Soliq', 'Toza foyda', 'Marja %'];
        const rows = months.map(m => [
          fmtMonth(m.ymKey),
          m.rows.length,
          m.kpi.sales_qty,
          Math.round(m.kpi.revenue),
          Math.round(m.kpi.all_wb_deductions),
          Math.round(m.kpi.cost),
          Math.round(m.kpi.tax),
          Math.round(m.kpi.net_profit),
          m.kpi.margin_pct.toFixed(2)
        ]);
        const csv = [header, ...rows].map(r => r.join(';')).join('\n');
        const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `aira-oylar-${new Date().toISOString().substring(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        notify('Eksport tayyor', 'success');
      };
    })();
  };
</script>

</body>
</html>
